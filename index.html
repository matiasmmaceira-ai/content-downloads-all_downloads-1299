                  </div>
                );
              })}
              <div style={{fontSize:10,color:C.mut,textAlign:"center",fontStyle:"italic",marginTop:6}}>{"Mes en curso · "+MONTHS[Number(Tym.split("-")[1])-1]+" "+Tym.split("-")[0]}</div>
            </div>

            <div style={CARD}>
              <div style={{fontSize:11,color:C.mut,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>{"✅ Mi cumplimiento mensual"}</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:120,padding:"6px 0",marginBottom:6}}>
                {cumpl6.map(x=>{
                  const v=x.pct;
                  const color=v===null?"#2d4a2d":v>=90?"linear-gradient(to top,#15803d,#4ade80)":v>=70?"linear-gradient(to top,#a16207,#fbbf24)":"linear-gradient(to top,#991b1b,#ef4444)";
                  return(
                    <div key={x.ym} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                      <div style={{fontSize:9,color:C.grn,fontWeight:700}}>{v===null?"-":v+"%"}</div>
                      <div style={{width:"100%",background:color,borderRadius:"6px 6px 0 0",minHeight:4,height:(v===null?4:Math.max(4,v*1.1))+"px"}}/>
                      <div style={{fontSize:10,color:C.mut,textAlign:"center"}}>{lblMes(x.ym)}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:10,color:C.mut,textAlign:"center",fontStyle:"italic",marginTop:4}}>{"Hechos / (hechos + mis cxl) · No cuentan cxl del cliente"}</div>
            </div>
          </>
        );
      })()}
      {sec==="rutas"&&(
        <div>
          <div style={{display:"flex",gap:6,marginBottom:14,background:C.cl,borderRadius:12,padding:3}}>
            <button onClick={()=>setRutPer("sem")} style={{flex:1,padding:"9px 2px",borderRadius:9,border:"none",fontWeight:700,fontSize:13,cursor:"pointer",background:rutPer==="sem"?C.grn:"transparent",color:rutPer==="sem"?"#0f1a14":C.mut}}>{"Semana"}</button>
            <button onClick={()=>setRutPer("mes")} style={{flex:1,padding:"9px 2px",borderRadius:9,border:"none",fontWeight:700,fontSize:13,cursor:"pointer",background:rutPer==="mes"?C.grn:"transparent",color:rutPer==="mes"?"#0f1a14":C.mut}}>{"Mes"}</button>
          </div>
          {rutPer==="sem"
            ?<NB lbl={wr.from.slice(5)+" - "+wr.to.slice(5)} onP={()=>onWk(addWks(selWk,-1))} onN={()=>onWk(addWks(selWk,1))} isCur={isCurW}/>
            :<NB lbl={MONTHS[parseInt(selMo.split("-")[1])-1]+" "+selMo.split("-")[0]} onP={()=>onMo(addMos(selMo,-1))} onN={()=>onMo(addMos(selMo,1))} isCur={isCurM}/>
          }
          {(()=>{
            const ps=rutPer==="sem"?wp:mp;
            const DIAS=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
            const formatTime=m=>{const h=Math.floor(m/60),mm=m%60;return h>0?h+"h "+mm+"min":mm+"min";};
            const perPerro=mDogs.map(dog=>{
              const dp=ps.filter(p=>p.dogId===dog.id);
              const comp=dp.filter(p=>p.status==="completado");
              if(comp.length===0&&dp.filter(p=>p.status==="cancelado").length===0)return null;
              let totalMin=0,movMin=0,canilMin=0,kmTotal=0,diasConDatos=0;
              comp.forEach(p=>{
                let m=p.metrics||null;
                if(!m){
                  const dow=new Date(p.fecha+"T12:00:00").getDay();
                  const route=routes.find(r=>r.key===dow+"_"+p.gid);
                  if(!route)return;
                  m=calcDogMetricsForRoute({...route,gid:p.gid},dog,gg,mDogs,paseos,p.fecha);
                }
                if(!m)return;
                diasConDatos++;
                totalMin+=m.minsFuera;
                movMin+=m.minsMov;
                canilMin+=m.canilMin;
                kmTotal+=m.km;
              });
              kmTotal=Math.round(kmTotal*10)/10;
              const diasUnicos=[...new Set(comp.map(p=>DIAS[new Date(p.fecha+"T12:00:00").getDay()]))];
              const ordenDias={"Lun":1,"Mar":2,"Mie":3,"Jue":4,"Vie":5,"Sab":6,"Dom":7};
              diasUnicos.sort((a,b)=>ordenDias[a]-ordenDias[b]);
              const diasComp=diasUnicos.join(", ");
              const compensadosIds=new Set();
              (dog.groups||[]).forEach(grp=>{
                const psGrp=dp.filter(p=>(p.dgid===grp.id||(p.gid===grp.id&&!p.dgid)));
                if(rutPer==="sem"){
                  const c=getCxlCompensadosIds(psGrp);
                  c.forEach(id=>compensadosIds.add(id));
                }else{
                  const bw={};
                  psGrp.forEach(p=>{const k=wkRange(p.fecha).from;if(!bw[k])bw[k]=[];bw[k].push(p);});
                  Object.values(bw).forEach(sp=>{
                    const c=getCxlCompensadosIds(sp);
                    c.forEach(id=>compensadosIds.add(id));
                  });
                }
              });
              const cxlCli=dp.filter(p=>p.status==="cancelado"&&p.cancelBy==="client"&&!compensadosIds.has(p.id)).length;
              const cxlMia=dp.filter(p=>p.status==="cancelado"&&p.cancelBy==="me"&&!compensadosIds.has(p.id)).length;
              // Agrupar paseos completados por gid para mostrar desglose
              const porGrp={};
              comp.forEach(p=>{porGrp[p.gid]=(porGrp[p.gid]||0)+1;});
              const grpsActivos=Object.entries(porGrp);
              let grpName;
              if(grpsActivos.length===0){
                const grupo=(dog.groups||[])[0];
                const gObj=grupo?gg.find(g=>g.id===grupo.gid):null;
                grpName=gObj?.name||"Sin grupo";
              }else if(grpsActivos.length===1){
                const gObj=gg.find(g=>g.id===grpsActivos[0][0]);
                grpName=gObj?.name||"Sin grupo";
              }else{
                grpName=grpsActivos.map(([gid,cnt])=>{
                  const gObj=gg.find(g=>g.id===gid);
                  return cnt+" en "+(gObj?.name||"Sin nombre");
                }).join(", ");
              }
              const cl=clients.find(c=>c.id===dog.cid);
              return{dog,cl,comp,totalMin,movMin,canilMin,kmTotal,diasComp,cxlCli,cxlMia,grpName,diasConDatos};
            }).filter(Boolean);
            perPerro.sort((a,b)=>b.kmTotal-a.kmTotal||b.comp.length-a.comp.length);
            // Reales del paseador: por cada dia+grupo unico, los km/tiempo de la ruta (no se suman por perro)
            let totKmReal=0,totMinReal=0;
            const diasGrpVistos=new Set();
            ps.filter(p=>p.status==="completado").forEach(p=>{
              const k=p.fecha+"_"+p.gid;
              if(diasGrpVistos.has(k))return;
              diasGrpVistos.add(k);
              // Si el paseo tiene snapshot con datos de ruta, usar eso (historico fiel)
              if(p.metrics&&p.metrics.legMinsSum!==undefined){
                const m=p.metrics;
                totKmReal+=(m.legMinsSum+m.returnMinsSum)/(m.minPorKm||15);
                totMinReal+=m.legMinsSum+m.returnMinsSum+(m.stayMins||0);
                return;
              }
              // Fallback al vivo con la ruta actual
              const dow=new Date(p.fecha+"T12:00:00").getDay();
              const route=routes.find(r=>r.key===dow+"_"+p.gid);
              if(!route)return;
              const grpObj=gg.find(g=>g.id===p.gid);
              const mPK=grpObj?.minPorKm||15;
              const stay=route.stayMins??60;
              const minsLeg=(route.legMins||[]).reduce((s,m)=>s+(m||0),0);
              const minsReturn=(route.returnMins||[]).reduce((s,m)=>s+(m||0),0);
              totKmReal+=(minsLeg+minsReturn)/mPK;
              totMinReal+=minsLeg+minsReturn+stay;
            });
            const totKm=Math.round(totKmReal*10)/10;
            const totMin=Math.round(totMinReal);
            const totPaseos=perPerro.reduce((s,p)=>s+p.comp.length,0);
            const periodoLbl=rutPer==="sem"?"de la semana":"del mes";
            return(
              <>
                <div style={{background:"#14532d",borderRadius:16,padding:14,marginBottom:14,border:"1px solid #166534"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.grn}33`}}>
                    <span style={{fontSize:12,color:C.grn,opacity:.9}}>{"Km totales "+periodoLbl}</span>
                    <span style={{fontSize:16,fontWeight:800,color:C.txt}}>{totKm.toFixed(1)+" km"}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.grn}33`}}>
                    <span style={{fontSize:12,color:C.grn,opacity:.9}}>{"Tiempo total"}</span>
                    <span style={{fontSize:16,fontWeight:800,color:C.txt}}>{formatTime(totMin)}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0"}}>
                    <span style={{fontSize:12,color:C.grn,opacity:.9}}>{"Paseos completados"}</span>
                    <span style={{fontSize:16,fontWeight:800,color:C.txt}}>{totPaseos}</span>
                  </div>
                </div>
                <div style={CARD}>
                  <div style={{fontSize:11,color:C.mut,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>{"Recorrido por perro"}</div>
                  {perPerro.length===0&&<div style={{textAlign:"center",padding:16,color:C.mut,fontSize:13}}>{"Sin datos de actividad para este periodo"}</div>}
                  {perPerro.map(p=>(
                    <div key={p.dog.id} style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${C.bdr}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <div style={{width:36,height:36,borderRadius:"50%",background:p.dog.color+"22",border:`2px solid ${p.dog.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:p.dog.color,flexShrink:0}}>{p.dog.name.charAt(0).toUpperCase()}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:800,fontSize:14,color:C.txt}}>{p.dog.name+(p.cl?" - "+p.cl.name:"")}</div>
                          <div style={{fontSize:11,color:C.grn}}>{p.comp.length+" paseos - "+p.grpName}</div>
                          {p.diasComp&&<div style={{fontSize:11,color:C.mut,marginTop:2}}>{"Dias: "+p.diasComp}</div>}
                        </div>
                      </div>
                      {(p.cxlCli>0||p.cxlMia>0)&&(
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                          {p.cxlCli>0&&<span style={{fontSize:11,background:"#2a0f0f",borderRadius:8,padding:"3px 8px",color:"#fca5a5"}}>{p.cxlCli+" cxl cliente"}</span>}
                          {p.cxlMia>0&&<span style={{fontSize:11,background:"#1e3a5f",borderRadius:8,padding:"3px 8px",color:"#93c5fd"}}>{p.cxlMia+" cxl mia"}</span>}
                        </div>
                      )}
                      {p.diasConDatos>0?(
                        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
                          <div style={{background:"rgba(0,0,0,.25)",borderRadius:8,padding:"6px 8px"}}>
                            <div style={{fontSize:10,color:C.mut}}>{"Km"}</div>
                            <div style={{fontSize:14,fontWeight:800,color:C.grn}}>{p.kmTotal.toFixed(1)+" km"}</div>
                          </div>
                          <div style={{background:"rgba(0,0,0,.25)",borderRadius:8,padding:"6px 8px"}}>
                            <div style={{fontSize:10,color:C.mut}}>{"Tiempo total"}</div>
                            <div style={{fontSize:14,fontWeight:800,color:C.amb}}>{formatTime(p.totalMin)}</div>
                          </div>
                          <div style={{background:"rgba(0,0,0,.25)",borderRadius:8,padding:"6px 8px"}}>
                            <div style={{fontSize:10,color:C.mut}}>{"Movimiento"}</div>
                            <div style={{fontSize:14,fontWeight:800,color:C.grn}}>{formatTime(p.movMin)}</div>
                          </div>
                          <div style={{background:"rgba(0,0,0,.25)",borderRadius:8,padding:"6px 8px"}}>
                            <div style={{fontSize:10,color:C.mut}}>{"Canil"}</div>
                            <div style={{fontSize:14,fontWeight:800,color:"#93c5fd"}}>{formatTime(p.canilMin)}</div>
                          </div>
                        </div>
                      ):(
                        <div style={{fontSize:11,color:C.mut,fontStyle:"italic",textAlign:"center",padding:"6px 0"}}>{"Sin rutas configuradas para este perro"}</div>
                      )}
                    </div>
                  ))}
                </div>
              </>
            );
          })()}
        </div>
      )}
    </div>
  );
}

    <div style={{display:"flex",gap:6,marginBottom:24}}>
      {[0,1,2].map(i=>(
        <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?C.grn:C.bdr}}/>

    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:300,padding:20,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",overflowY:"auto"}}>

          <button onClick={onSkip} style={{background:"transparent",border:"none",color:C.mut,marginTop:10,fontSize:13,cursor:"pointer",padding:10}}>{"Saltar y configurar despues"}</button>
        </div>
      )}
      {step===1&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <Progress/>
          <div style={{fontSize:11,color:C.grn,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{"Paso 1 de 3"}</div>
          <div style={{fontSize:22,fontWeight:800,color:C.txt,marginBottom:8}}>{"Como cobras a tus clientes?"}</div>
          <div style={{fontSize:13,color:C.mut,marginBottom:24}}>{"Podes elegir distinto para cada cliente despues."}</div>
          {[
            {id:"pack_dinamico",titulo:"Tarifa dinamica",desc:"El precio cambia segun cuantos dias hace el perro por semana. Ej: 3 dias = $27k, 5 dias = $35k"},
            {id:"por_paseo",titulo:"Por paseo",desc:"Precio fijo cada vez que paseas. Ej: $10k cada vez."},
            {id:"fijo_semanal",titulo:"Tarifa fija semanal",desc:"Mismo monto cada semana sin importar cuantos paseos. Ej: $30k/semana."},
          ].map(opt=>(
            <div key={opt.id} onClick={()=>setTipoCobro(opt.id)} style={{background:C.card,borderRadius:14,padding:16,marginBottom:10,cursor:"pointer",border:`${tipoCobro===opt.id?2:1}px solid ${tipoCobro===opt.id?C.grn:C.bdr}`}}>
              <div style={{fontWeight:800,fontSize:15,color:tipoCobro===opt.id?C.grn:C.txt,marginBottom:4}}>{opt.titulo}</div>
              <div style={{fontSize:13,color:C.mut,lineHeight:1.4}}>{opt.desc}</div>
            </div>
          ))}
          <div style={{flex:1}}/>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={()=>setStep(0)} style={{...Btn(C.cl,C.mut),flex:1}}>{"Atras"}</button>
            <button onClick={()=>setStep(2)} disabled={!tipoCobro} style={{...Btn(tipoCobro?C.grn:C.bdr,tipoCobro?"#0f1a14":C.mut),flex:2}}>{"Siguiente"}</button>
          </div>
        </div>
      )}
      {step===2&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <Progress/>
          <div style={{fontSize:11,color:C.grn,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{"Paso 2 de 3"}</div>
          <div style={{fontSize:22,fontWeight:800,color:C.txt,marginBottom:8}}>{"Cuando paseas?"}</div>
          <div style={{fontSize:13,color:C.mut,marginBottom:24}}>{"Crea tu primer grupo. Podes agregar mas despues desde Rutas."}</div>
          <div style={{marginBottom:14}}>
            <label style={LBL}>{"Nombre del grupo"}</label>
            <input value={grupoNombre} onChange={e=>setGrupoNombre(e.target.value)} placeholder={"ej: 7hs"} style={INP}/>

            <label style={LBL}>{"Hora de salida"}</label>
            <input type="time" value={grupoHora} onChange={e=>setGrupoHora(e.target.value)} style={INP}/>

          <div style={{flex:1}}/>
          <div style={{display:"flex",gap:8,marginTop:16}}>

          </div>
        </div>
      )}
      {step===3&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:16}}>{"✅"}</div>
          <div style={{fontSize:24,fontWeight:800,color:C.txt,marginBottom:12}}>{"Grupo creado"}</div>
          <div style={{fontSize:14,color:C.mut,marginBottom:8,lineHeight:1.5}}>{"Ahora vamos a cargar tu primer cliente con su perro."}</div>
          <div style={{fontSize:13,color:"#86efac",marginBottom:32,lineHeight:1.5,background:"#0a1a14",border:"1px dashed #22c55e44",borderRadius:14,padding:14}}>{"En el formulario vas a poder asignar el grupo "+grupoNombre+" y elegir los dias del perro."}</div>
          <button onClick={()=>{onCreateClient();onComplete();}} style={{...Btn(C.grn,"#0f1a14"),width:"100%",fontSize:15,padding:"14px 20px"}}>{"Cargar primer cliente"}</button>
          <button onClick={onComplete} style={{background:"transparent",border:"none",color:C.mut,marginTop:10,fontSize:13,cursor:"pointer",padding:10}}>{"Saltar y hacerlo despues"}</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const T=td();
  const[dogs,setDogs]=usePersist("pc_dogs",INIT_DOGS);
  const[clients,setClients]=usePersist("pc_clients",INIT_CL);
  const[routes,setRoutes]=usePersist("pc_routes",[]);
  const[globalRoute,setGlobalRoute]=usePersist("pc_global",{origin:"",destination:"",minPorKm:15});
  const[gg,setGG]=usePersist("pc_groups",INIT_GG);
  const[paseos,setPaseos]=usePersist("pc_paseos",()=>initPaseos(loadLS("pc_dogs",INIT_DOGS)));
  const[confReset,setConfReset]=useState(false);
  const[showBackup,setShowBackup]=useState(false);
  const[showDiag,setShowDiag]=useState(false);
  const[showWarnings,setShowWarnings]=useState(false);
  const[showMenu,setShowMenu]=useState(false);
  const[importTxt,setImportTxt]=useState("");
  const[importErr,setImportErr]=useState("");
  const[importOk,setImportOk]=useState(false);
  const realPs=Array.isArray(paseos)?paseos:initPaseos(dogs);
  // Migracion de IDs numericos a string (una sola vez)
  const[idsMigrated,setIdsMigrated]=usePersist("pc_ids_migrated_v3",false);
  const[migrationError,setMigrationError]=useState(null);
  useEffect(()=>{
    if(idsMigrated)return;
    try{
      const result=migrateIdsInPlace(dogs,clients,realPs,gg);
      if(result.needed){
        setDogs(result.dogs);
        setClients(result.clients);
        setPaseos(result.paseos);
        setGG(result.gg);
        pushWarning("IDS_MIGRATED",{count:{dogs:result.dogs.length,clients:result.clients.length,paseos:result.paseos.length}});
      }
      setIdsMigrated(true);
    }catch(e){
      setMigrationError(e.message);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);
  const doReset=()=>{["pc_dogs","pc_clients","pc_paseos","pc_routes","pc_global","pc_groups","pc_ajustes"].forEach(k=>localStorage.removeItem(k));setDogs(INIT_DOGS);setClients(INIT_CL);setRoutes([]);setGlobalRoute({origin:"",destination:"",minPorKm:15});setGG(INIT_GG);setPaseos(initPaseos(INIT_DOGS));setConfReset(false);setTab("agenda");};
  const doExport=()=>{const data={v:BACKUP_VERSION,ts:new Date().toISOString(),dogs,clients,routes,globalRoute,gg,paseos:realPs,ajustes};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="PaseoCan-backup-"+T+".json";a.click();URL.revokeObjectURL(url);};
  const doImport=()=>{
    setImportErr("");setImportOk(false);
    try{
      const raw=JSON.parse(importTxt);
      const d=migrateBackup(raw);
      if(d.dogs)setDogs(d.dogs);
      if(d.clients)setClients(d.clients);
      if(d.routes)setRoutes(d.routes);
      if(d.globalRoute)setGlobalRoute(d.globalRoute);
      if(d.gg)setGG(d.gg);
      if(d.paseos)setPaseos(d.paseos);
      if(d.ajustes)setAjustes(d.ajustes);
      setImportOk(true);setImportTxt("");
      setTimeout(()=>{setShowBackup(false);setImportOk(false);},1500);
    }catch(e){
      setImportErr(e.message||"Archivo invalido");

              {label:"Ver tutorial",icon:"🐕",action:()=>{setOnboardingDone(false);setShowMenu(false);}},
              {label:"Diagnóstico",icon:"🔧",action:()=>{setShowDiag(d=>!d);setShowMenu(false);}},
              {label:"Log de warnings",icon:(()=>{const ws=window.__WARN__||[];const hasCrit=ws.some(w=>w.type==="LEGACY_ADJ");return ws.length>0?(hasCrit?"🔴":"🟡"):"⚪";})(),action:()=>{setShowWarnings(w=>!w);setShowMenu(false);}},
            ].map(item=>(
              <button key={item.label} onClick={item.action} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 12px",background:"rgba(255,255,255,.04)",border:`1px solid ${C.bdr}`,borderRadius:12,cursor:"pointer",color:C.txt,fontSize:14,fontWeight:500,textAlign:"left",width:"100%"}}>
                <span style={{fontSize:20}}>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
            <div style={{marginTop:"auto",borderTop:`1px solid ${C.bdr}`,paddingTop:16}}>
              <button onClick={()=>{setConfReset(true);setShowMenu(false);}} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 12px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,cursor:"pointer",color:"#fca5a5",fontSize:14,fontWeight:500,width:"100%"}}>
                <span style={{fontSize:20}}>{"⚠️"}</span>
                <span>{"Reset datos"}</span>
              </button>
            </div>
          </div>
        </div>
      )}
      {confReset&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,borderRadius:20,padding:28,maxWidth:340,width:"100%",textAlign:"center",border:`1px solid ${C.bdr}`}}>
            <div style={{fontWeight:800,fontSize:18,color:C.txt,marginBottom:8}}>{"Reiniciar datos?"}</div>
            <div style={{fontSize:13,color:C.amb,marginBottom:20,background:"#1a1200",borderRadius:10,padding:"10px 14px",border:"1px solid #4a3a00"}}>{"Solo afecta este artifact. Produccion no se toca."}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfReset(false)} style={{...Btn(C.cl,C.mut),flex:1}}>{"Cancelar"}</button>
              <button onClick={doReset} style={{...Btn("#7f1d1d","#fca5a5"),flex:1}}>{"Reiniciar"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>

  <!-- Service Worker para offline -->
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        // SW inline como blob
        const swCode = `
          const CACHE = 'paseocan-v1';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).catch(()=>new Response('Offline')))
            );
          });
        `;
        const blob = new Blob([swCode], {type:'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(()=>{});
      });
    }
  </script>
