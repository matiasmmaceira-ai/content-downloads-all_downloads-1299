const { useState, useMemo, useCallback, useEffect } = React;

// ── Constantes ────────────────────────────────────────────────────────────────
const DAYS_ES   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const getToday  = () => new Date().toISOString().slice(0,10);

const pad2 = n => String(n).padStart(2,"0");
const ds   = (y,m,d) => `${y}-${pad2(m+1)}-${pad2(d)}`;
const ars  = n => `$${Number(n||0).toLocaleString("es-AR")}`;
const wa   = (p,m) => `https://wa.me/${p.replace(/\D/g,"")}?text=${encodeURIComponent(m)}`;
const gMaps= a => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a)}`;
const gDir = stops => `https://www.google.com/maps/dir/${stops.filter(Boolean).map(encodeURIComponent).join("/")}/data=!4m2!4m1!3e2`;
const g2   = (a,b) => `https://www.google.com/maps/dir/${encodeURIComponent(a)}/${encodeURIComponent(b)}/data=!4m2!4m1!3e2`;
const addMin=(t,m)=>{ const [h,mm]=t.split(":").map(Number),tot=h*60+mm+m; return `${pad2(Math.floor(tot/60)%24)}:${pad2(tot%60)}`; };

function weekRange(dateStr) {
  const d=new Date(dateStr+"T12:00:00"), dow=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=x=>`${x.getFullYear()}-${pad2(x.getMonth()+1)}-${pad2(x.getDate())}`;
  return {from:fmt(mon),to:fmt(sun)};
}
function addWeeks(ds,n){ const d=new Date(ds+"T12:00:00"); d.setDate(d.getDate()+n*7); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function addMonths(ms,n){ const [y,m]=ms.split("-").map(Number); const d=new Date(y,m-1+n,1); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }

// ── Precios ───────────────────────────────────────────────────────────────────
const DEFAULT_PRICES=[13000,20000,27000,32000,35000];
const priceFor    =(freq,tbl)=>(tbl||DEFAULT_PRICES)[Math.min(Math.max(freq,1),5)-1];
const unitPriceFor=(freq,tbl)=>Math.round(priceFor(freq,tbl)/Math.max(freq,1));

function calcCobroUnitario(ps,dog){
  const r=ps.filter(p=>p.status==="completado").length;
  const cc=ps.filter(p=>p.status==="cancelado"&&p.cancelBy==="client").length;
  const cy=ps.filter(p=>p.status==="cancelado"&&p.cancelBy==="me").length;
  return {modo:"unitario",realizados:r,cxlCliente:cc,cxlYo:cy,precio:dog.unitPrice,cobro:r*dog.unitPrice};
}
function calcCobroPaquete(ps,dog){
  const r=ps.filter(p=>p.status==="completado").length;
  const cc=ps.filter(p=>p.status==="cancelado"&&p.cancelBy==="client").length;
  const cy=ps.filter(p=>p.status==="cancelado"&&p.cancelBy==="me").length;
  const pc=(dog.schedule||[]).length;           // pack contratado (define precio unitario)
  const pu=unitPriceFor(pc,dog.prices);         // precio unitario del pack contratado

  // Pack acumulado = realizados + mis cancelaciones (ambos "consumen" un slot)
  // cxlCliente NO mueve el pack
  // Si no hubo ningún paseo realizado, cobro = 0 siempre
  if(r===0) return {modo:"paquete",realizados:0,cxlCliente:cc,cxlYo:cy,packContratado:pc,packAcumulado:0,precioUnitCont:pu,descuentoCxlYo:0,cobro:0};
  const packAcumulado=Math.min(r+cy, 5);        // máximo 5

  if(packAcumulado===0) return {modo:"paquete",realizados:r,cxlCliente:cc,cxlYo:cy,
    packContratado:pc,packAcumulado:0,precioUnitCont:pu,descuentoCxlYo:0,cobro:0};

  const precioAcumulado=priceFor(packAcumulado,dog.prices);  // precio del pack acumulado
  const descuentoCxlYo=cy*pu;                               // descuento por mis cancelaciones
  const cobro=Math.max(precioAcumulado-descuentoCxlYo,0);

  return {modo:"paquete",realizados:r,cxlCliente:cc,cxlYo:cy,
    packContratado:pc,packAcumulado,precioAcumulado,precioUnitCont:pu,descuentoCxlYo,cobro};
}
function calcCobro(ps,dog){ return dog.unitPrice>0?calcCobroUnitario(ps,dog):calcCobroPaquete(ps,dog); }

function makePaseos(dog,existing){
  const TODAY=getToday(), seen=new Set(existing.filter(p=>p.dogId===dog.id).map(p=>`${dog.id}-${p.fecha}`));
  const base=new Date(TODAY+"T12:00:00"), days=dog.schedule.map(Number), price=dog.unitPrice||priceFor(days.length,dog.prices), out=[];
  let nid=Date.now();
  for(let i=0;i<49;i++){
    const d=new Date(base); d.setDate(base.getDate()+i);
    const dow=d.getDay(); if(!days.includes(dow)) continue;
    const fecha=ds(d.getFullYear(),d.getMonth(),d.getDate()), key=`${dog.id}-${fecha}`;
    if(seen.has(key)) continue; seen.add(key);
    out.push({id:nid++,dogId:dog.id,clientId:dog.clientId,fecha,status:"programado",cancelBy:null,paid:false,paidAmount:0,freq:days.length,price,manual:false});
  }
  return out;
}
function initPaseos(dogs){
  const TODAY=getToday(), seen=new Set(), all=[];
  dogs.forEach(dog=>{
    const base=new Date(TODAY+"T12:00:00"), days=dog.schedule.map(Number), price=dog.unitPrice||priceFor(days.length,dog.prices);
    let nid=Date.now()+dog.id*1000;
    for(let i=0;i<49;i++){
      const d=new Date(base); d.setDate(base.getDate()+i);
      const dow=d.getDay(); if(!days.includes(dow)) continue;
      const fecha=ds(d.getFullYear(),d.getMonth(),d.getDate()), key=`${dog.id}-${fecha}`;
      if(seen.has(key)) continue; seen.add(key);
      all.push({id:nid++,dogId:dog.id,clientId:dog.clientId,fecha,status:"programado",cancelBy:null,paid:false,paidAmount:0,freq:days.length,price,manual:false});
    }
  });
  return all;
}

// ── localStorage ──────────────────────────────────────────────────────────────
function loadLS(key,fb){
  try{
    const r=localStorage.getItem(key);
    if(r===null||r===undefined||r==="null") return typeof fb==="function"?fb():fb;
    const parsed=JSON.parse(r);
    if(parsed===null||parsed===undefined) return typeof fb==="function"?fb():fb;
    return parsed;
  }catch{ return typeof fb==="function"?fb():fb; }
}
function saveLS(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch{} }
function usePersisted(key,fb){
  const [state,setState]=useState(()=>loadLS(key,fb));
  const set=useCallback(val=>{ setState(prev=>{ const next=typeof val==="function"?val(prev):val; saveLS(key,next); return next; }); },[key]);
  return [state,set];
}

// ── AGENDA ────────────────────────────────────────────────────────────────────
function Agenda({paseos,setPaseos,dogs,setDogs,clients,onAdd}){
  const TODAY=getToday();
  const [selDate,setSelDate]=useState(TODAY);
  const [vyear,setVyear]=useState(()=>parseInt(TODAY.split("-")[0]));
  const [vmonth,setVmonth]=useState(()=>parseInt(TODAY.split("-")[1])-1);
  const [confirmAll,setConfAll]=useState(false);
  const [cxlModal,setCxlM]=useState(null);

  const dog=id=>dogs.find(d=>d.id===id);
  const client=id=>clients.find(c=>c.id===id);
  const dim=new Date(vyear,vmonth+1,0).getDate();
  const fd=new Date(vyear,vmonth,1).getDay();
  const dow=new Date(selDate+"T12:00:00").getDay();

  const byDate=useMemo(()=>{
    const m={};
    paseos.forEach(p=>{(m[p.fecha]=m[p.fecha]||[]).push(p);});
    return m;
  },[paseos]);

  const dayPaseos=useMemo(()=>
    (byDate[selDate]||[]).slice().sort((a,b)=>{
      const da=dogs.find(d=>d.id===a.dogId), db=dogs.find(d=>d.id===b.dogId);
      return (da?.walkTime||"08:00").localeCompare(db?.walkTime||"08:00");
    })
  ,[byDate,selDate,dogs]);

  const pending=dayPaseos.filter(p=>p.status==="programado");
  const allDone=dayPaseos.length>0&&!pending.length;

  const completeAll=()=>{ setPaseos(ps=>ps.map(p=>p.fecha===selDate&&p.status==="programado"?{...p,status:"completado"}:p)); setConfAll(false); };
  const doCxl=(pid,by)=>{
    setPaseos(ps=>ps.map(p=>p.id===pid?{...p,status:"cancelado",cancelBy:by}:p));
    if(by==="client"){ const p=paseos.find(x=>x.id===pid); if(p) setDogs(ds=>ds.map(d=>d.id===p.dogId?{...d,cancellations:[...(d.cancellations||[]),{fecha:selDate,by:"client",nota:`Canceló el ${DAYS_ES[dow]}`}]}:d)); }
    setCxlM(null);
  };

  const prev=()=>vmonth===0?(setVmonth(11),setVyear(y=>y-1)):setVmonth(m=>m-1);
  const next=()=>vmonth===11?(setVmonth(0),setVyear(y=>y+1)):setVmonth(m=>m+1);

  return (
    <div>
      {/* Calendario */}
      <div style={{...CARD,padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={prev} style={{...BTN("transparent",C.green),padding:"6px 12px",fontSize:18}}>‹</button>
          <span style={{fontWeight:800,fontSize:15,color:C.text}}>{MONTHS_ES[vmonth]} {vyear}</span>
          <button onClick={next} style={{...BTN("transparent",C.green),padding:"6px 12px",fontSize:18}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
          {DAYS_ES.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:C.textMuted,paddingBottom:4}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {Array.from({length:fd}).map((_,i)=><div key={`e${i}`}/>)}
          {Array.from({length:dim}).map((_,i)=>{
            const day=i+1, fecha=ds(vyear,vmonth,day);
            const dp=byDate[fecha]||[];
            const iT=fecha===TODAY, iS=fecha===selDate;
            const hasDone=dp.some(p=>p.status==="completado"), hasPend=dp.some(p=>p.status==="programado");
            return (
              <div key={day} onClick={()=>setSelDate(fecha)}
                style={{borderRadius:8,padding:"5px 2px",textAlign:"center",cursor:"pointer",
                  background:iS?C.green:iT?C.green+"22":"transparent",
                  border:iT&&!iS?`1.5px solid ${C.green}`:"1.5px solid transparent",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <span style={{fontSize:12,fontWeight:iS||iT?800:400,color:iS?"#0f1a14":iT?C.green:C.text}}>{day}</span>
                {dp.length>0&&<div style={{width:5,height:5,borderRadius:"50%",background:iS?"#0f1a14":hasDone?C.green:hasPend?C.blue:"#4b5563"}}/>}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>
          {new Date(selDate+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}
        </div>
        <button onClick={()=>onAdd(selDate)} style={{...BTN(C.green,"#0f1a14"),padding:"7px 14px",fontSize:13}}>+ Paseo</button>
      </div>

      {dayPaseos.length===0&&(
        <div style={{...CARD,textAlign:"center",padding:"32px 0",color:C.textMuted}}>Sin paseos este día 🐾</div>
      )}

      {dayPaseos.map(p=>{
        const d=dog(p.dogId); if(!d) return null;
        const cl=client(d.clientId);
        const sc=SC[p.status];
        return (
          <div key={p.id} style={{...CARD,borderLeft:`4px solid ${p.status==="cancelado"?C.border:d.color}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:d.color+"22",border:`2.5px solid ${p.status==="cancelado"?C.border:d.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,opacity:p.status==="cancelado"?0.4:1}}>🐕</div>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:p.status==="cancelado"?C.textMuted:C.text}}>
                    {d.name}{p.manual?" 🔸":""}
                    {d.walkTime&&d.walkTime!=="08:00"&&<span style={{fontSize:11,color:C.textMuted,marginLeft:6}}>🕐{d.walkTime}</span>}
                  </div>
                  <div style={{fontSize:13,color:C.textMuted}}>{cl?.name}</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>
                    {d.unitPrice>0?`${ars(d.unitPrice)}/paseo`:`Pack ${d.schedule.length}d · ${ars(unitPriceFor(d.schedule.length,d.prices))}/paseo`}
                  </div>
                  {d.medication&&<div style={{fontSize:11,color:"#fca5a5",marginTop:2}}>💊 {d.medication}</div>}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <Tag bg={sc.bg} color={sc.text}>{p.status}</Tag>
                <EmergencyBadge dog={d}/>
              </div>
            </div>
            {p.status==="programado"&&(
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button onClick={()=>setCxlM({pid:p.id,dname:d.name})} style={{...BTN(C.cardLight,C.textMuted),flex:1,padding:9,fontSize:13}}>Cancelar</button>
                {cl&&<a href={wa(cl.phone,`Hola ${cl.name}, confirmo el paseo de ${d.name} hoy 🐾`)} target="_blank" rel="noreferrer"
                  style={{...BTN(C.wa,"white"),padding:"9px 14px",textDecoration:"none",display:"flex",alignItems:"center"}}>💬</a>}
              </div>
            )}
            {p.status==="completado"&&<div style={{marginTop:8,fontSize:12,color:C.green,fontWeight:600}}>✓ Completado</div>}
          </div>
        );
      })}

      {pending.length>0&&(
        <button onClick={()=>setConfAll(true)} style={{...BTN(C.green,"#0f1a14"),width:"100%",padding:14,fontSize:15,fontWeight:800,marginTop:4,borderRadius:14}}>
          ✓ Completar paseo · {pending.length} perro{pending.length!==1?"s":""}
        </button>
      )}
      {allDone&&dayPaseos.length>0&&<div style={{textAlign:"center",padding:14,fontSize:14,fontWeight:700,color:C.green,background:C.green+"22",borderRadius:14,marginTop:4}}>✓ ¡Todos completados!</div>}

      {cxlModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,borderRadius:20,padding:24,maxWidth:340,width:"100%",border:`1px solid ${C.border}`}}>
            <div style={{fontWeight:800,fontSize:18,color:C.text,textAlign:"center",marginBottom:6}}>¿Quién canceló?</div>
            <div style={{fontSize:14,color:C.textMuted,textAlign:"center",marginBottom:18}}>{cxlModal.dname}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={()=>doCxl(cxlModal.pid,"client")} style={{...BTN("#2a0f0f","#fca5a5"),textAlign:"left",padding:"12px 14px"}}>
                😔 Canceló el cliente
                <div style={{fontSize:11,opacity:.7,marginTop:2,fontWeight:400}}>Baja el pack esta semana</div>
              </button>
              <button onClick={()=>doCxl(cxlModal.pid,"me")} style={{...BTN("#0f1a2a","#93c5fd"),textAlign:"left",padding:"12px 14px"}}>
                🙋 Cancelé yo
                <div style={{fontSize:11,opacity:.7,marginTop:2,fontWeight:400}}>Descuento al precio unitario</div>
              </button>
              <button onClick={()=>setCxlM(null)} style={{...BTN(C.cardLight,C.textMuted)}}>Volver</button>
            </div>
          </div>
        </div>
      )}
      {confirmAll&&(
        <Confirm icon="🐾" title="¿Confirmar paseo?" sub={`${pending.length} perros`} onConfirm={completeAll} onCancel={()=>setConfAll(false)}/>
      )}
    </div>
  );
}

// ── RUTAS ─────────────────────────────────────────────────────────────────────
function Rutas({routes,setRoutes,dogs,clients,paseos,globalRoute,setGlobalRoute}){
  const TODAY=getToday();
  const [selDow,setSelDow]=useState(null);
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(null);
  const [editG,setEditG]=useState(false);
  const [draftG,setDraftG]=useState(null);

  const client=id=>clients.find(c=>c.id===id);
  const origin=r=>r.origin||globalRoute.origin;
  const dest=r=>r.destination||globalRoute.destination;
  const dowHoy=new Date(TODAY+"T12:00:00").getDay();
  const dogsOn=useCallback(dow=>dogs.filter(d=>d.schedule.includes(Number(dow))),[dogs]);
  const cxlHoyIds=useMemo(()=>paseos.filter(p=>p.fecha===TODAY&&p.status==="cancelado").map(p=>p.dogId),[paseos,TODAY]);

  const activeStops=useCallback((route)=>{
    const isToday=Number(route.dow)===Number(dowHoy);
    const cxl=isToday?cxlHoyIds:[];
    const scheduled=dogsOn(route.dow).filter(d=>!cxl.includes(d.id));
    const scheduledIds=new Set(dogsOn(route.dow).map(d=>d.id));
    const manual=isToday?paseos.filter(p=>p.fecha===TODAY&&p.manual&&p.status!=="cancelado"&&!scheduledIds.has(p.dogId)).map(p=>dogs.find(d=>d.id===p.dogId)).filter(Boolean):[];
    const all=[...scheduled,...manual];
    if(!route.stopOrder?.length) return all;
    return [...route.stopOrder.map(id=>all.find(d=>d.id===id)).filter(Boolean),...all.filter(d=>!route.stopOrder.includes(d.id))];
  },[dogsOn,dowHoy,cxlHoyIds,paseos,dogs,TODAY]);

  const allStops=useCallback(route=>{
    const all=dogsOn(route.dow);
    if(!route.stopOrder?.length) return all;
    return [...route.stopOrder.map(id=>all.find(d=>d.id===id)).filter(Boolean),...all.filter(d=>!route.stopOrder.includes(d.id))];
  },[dogsOn]);

  const arrivals=(route,stops)=>{
    let cur=route.startTime||"08:00"; const arr=[];
    stops.forEach((_,i)=>{cur=addMin(cur,route.legMins?.[i]||0);arr.push(cur);});
    arr.push(addMin(cur,route.legMins?.[stops.length]||0));
    return arr;
  };

  const moveStop=(route,stops,from,to)=>{
    const s=[...stops]; const [m]=s.splice(from,1); s.splice(to,0,m);
    setRoutes(rs=>rs.map(r=>r.id===route.id?{...r,stopOrder:s.map(d=>d.id)}:r));
  };

  if(selDow===null) return (
    <div>
      <div style={{fontWeight:800,fontSize:18,color:C.text,marginBottom:4}}>Rutas por día</div>
      <div style={{...CARD}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontWeight:700,fontSize:14,color:C.text}}>🏠 Puntos fijos</span>
          <button onClick={()=>{setDraftG({...globalRoute});setEditG(true);}} style={{...BTN(C.cardLight,C.green),padding:"6px 12px",fontSize:12}}>✏️ Editar</button>
        </div>
        <div style={{fontSize:13,color:globalRoute.origin?C.text:C.textMuted,marginBottom:4}}>📍 {globalRoute.origin||"Partida sin configurar"}</div>
        <div style={{fontSize:13,color:globalRoute.destination?C.text:C.textMuted}}>🏁 {globalRoute.destination||"Destino sin configurar"}</div>
      </div>
      {routes.map(r=>{
        const dd=dogsOn(r.dow);
        return (
          <div key={r.id} onClick={()=>setSelDow(r.dow)} style={{...CARD,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:48,height:48,borderRadius:12,background:dd.length?C.green+"22":C.cardLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{dd.length?"🦮":"😴"}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:16,color:C.text}}>{r.label}</div>
              <div style={{fontSize:13,color:C.textMuted}}>{dd.length?`${dd.length} perro${dd.length>1?"s":""} · Sale ${r.startTime}`:"Sin paseos"}</div>
              {dd.length>0&&(origin(r)&&dest(r)?<div style={{fontSize:11,color:C.green}}>✓ Lista</div>:<div style={{fontSize:11,color:C.amber}}>⚠ Falta configurar</div>)}
            </div>
            <span style={{color:C.textMuted,fontSize:18}}>›</span>
          </div>
        );
      })}
      {editG&&draftG&&(
        <Modal onClose={()=>setEditG(false)} title="🏠 Puntos fijos">
          <div style={{display:"grid",gap:12}}>
            <div><label style={LBL}>📍 Partida</label><input value={draftG.origin} onChange={e=>setDraftG(g=>({...g,origin:e.target.value}))} placeholder="Tu casa" style={INP}/></div>
            <div><label style={LBL}>🏁 Destino</label><input value={draftG.destination} onChange={e=>setDraftG(g=>({...g,destination:e.target.value}))} placeholder="Plaza / parque" style={INP}/></div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:18}}>
            <button onClick={()=>setEditG(false)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
            <button onClick={()=>{setGlobalRoute(draftG);setEditG(false);}} style={{...BTN(C.green,"#0f1a14"),flex:2}}>Guardar</button>
          </div>
        </Modal>
      )}
    </div>
  );

  const route=routes.find(r=>r.dow===selDow);
  const stops=activeStops(route);
  const aStops=allStops(route);
  const arr=arrivals(route,stops);
  const orig=origin(route), dst=dest(route);
  const addrs=[orig,...stops.map(d=>client(d.clientId)?.address||""),dst];
  const fullUrl=orig&&dst&&stops.length>0?gDir(addrs):null;
  const isToday=Number(selDow)===Number(dowHoy);
  const cxlIds=isToday?cxlHoyIds:[];

  return (
    <div>
      <button onClick={()=>setSelDow(null)} style={{...BTN("transparent",C.green),padding:"0 0 14px",fontSize:14}}>← Volver</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:20,color:C.text}}>{route.label}</div>
        <button onClick={()=>{const d={...route,legMins:[...(route.legMins||[])],stopOrder:aStops.map(d=>d.id)};while(d.legMins.length<aStops.length+1)d.legMins.push(0);setDraft(d);setEditing(true);}} style={{...BTN(C.cardLight,C.green),padding:"7px 14px",fontSize:13}}>✏️ Editar</button>
      </div>

      <div style={CARD}>
        <div style={{fontSize:11,color:C.textMuted,fontWeight:700,marginBottom:12,letterSpacing:"0.05em"}}>RECORRIDO · SALE {route.startTime}</div>
        <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:4}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:C.green,marginTop:2,flexShrink:0}}/>
            {(stops.length>0||dst)&&<div style={{width:2,flex:1,minHeight:20,background:C.border}}/>}
          </div>
          <div style={{flex:1,paddingBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:11,color:C.textMuted}}>PARTIDA</span>
              <span style={{fontSize:14,fontWeight:800,color:C.green}}>{route.startTime}</span>
            </div>
            <div style={{fontSize:13,color:orig?C.text:C.textMuted}}>{orig||"Sin configurar"}</div>
            {stops.length>0&&orig&&addrs[1]&&<a href={g2(orig,addrs[1])} target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:4,fontSize:11,color:C.blue,fontWeight:700,textDecoration:"none",background:C.blue+"22",borderRadius:6,padding:"2px 8px"}}>🗺 Maps →</a>}
          </div>
        </div>
        {stops.map((d,i)=>{
          const cl=client(d.clientId), isLast=i===stops.length-1;
          const nextAddr=isLast?dst:addrs[i+2], nextName=isLast?"destino":stops[i+1]?.name;
          return (
            <div key={d.id} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:4}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:d.color,flexShrink:0,marginTop:2}}/>
                {(!isLast||dst)&&<div style={{width:2,flex:1,minHeight:20,background:C.border}}/>}
              </div>
              <div style={{flex:1,paddingBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:11,color:C.textMuted}}>PARADA {i+1} · {d.name}</div>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>{cl?.name}</div>
                    <div style={{fontSize:12,color:C.textMuted}}>📍 {cl?.address}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                    <div style={{fontSize:15,fontWeight:800,color:C.green}}>{arr[i]}</div>
                    {route.legMins?.[i]>0&&<div style={{fontSize:10,color:C.textMuted}}>{route.legMins[i]}min</div>}
                  </div>
                </div>
                {nextAddr&&cl?.address&&<a href={g2(cl.address,nextAddr)} target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:4,fontSize:11,color:C.blue,fontWeight:700,textDecoration:"none",background:C.blue+"22",borderRadius:6,padding:"2px 8px"}}>🗺 → {nextName}</a>}
              </div>
            </div>
          );
        })}
        {dst&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:C.red,flexShrink:0,marginTop:2}}/>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:11,color:C.textMuted}}>DESTINO</span>
                {stops.length>0&&<span style={{fontSize:15,fontWeight:800,color:C.green}}>{arr[stops.length]}</span>}
              </div>
              <div style={{fontSize:13,color:C.text}}>{dst}</div>
            </div>
          </div>
        )}
        {!stops.length&&<div style={{textAlign:"center",padding:16,color:C.textMuted,fontSize:13}}>Sin perros activos este día</div>}
      </div>

      {fullUrl?<a href={fullUrl} target="_blank" rel="noreferrer" style={{...BTN(C.blue,"white"),display:"block",textDecoration:"none",textAlign:"center",marginBottom:12,padding:13,fontSize:14,borderRadius:14}}>🗺 Ver recorrido completo en Maps</a>
        :<div style={{background:"#1a1200",borderRadius:12,padding:12,fontSize:13,color:C.amber,marginBottom:12,textAlign:"center",border:"1px solid #4a3a00"}}>⚠ Configurá los puntos fijos para ver la ruta</div>}

      {stops.length>1&&(
        <div style={CARD}>
          <div style={{fontSize:11,color:C.textMuted,fontWeight:700,marginBottom:12,letterSpacing:"0.05em"}}>ORDEN DE RECOGIDA</div>
          {stops.map((d,i)=>{
            const cl=client(d.clientId), cxl=cxlIds.includes(d.id);
            const isManual=!dogsOn(route.dow).some(sd=>sd.id===d.id);
            return (
              <div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<stops.length-1?`1px solid ${C.border}`:"none",opacity:cxl?0.4:1}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:cxl?C.border:d.color,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text}}>{i+1}. {d.name}{isManual&&<Tag bg="#2a1a00" color={C.amber}> manual</Tag>}</div>
                  <div style={{fontSize:12,color:C.textMuted}}>{cl?.name}{cxl?" · ❌ Canceló":""}</div>
                </div>
                <div style={{display:"flex",gap:4}}>
                  {[["↑",i>0,()=>moveStop(route,stops,i,i-1)],["↓",i<stops.length-1,()=>moveStop(route,stops,i,i+1)]].map(([lbl,en,fn])=>(
                    <button key={lbl} onClick={en?fn:undefined} disabled={!en}
                      style={{background:en?C.green+"22":C.cardLight,color:en?C.green:C.border,border:"none",borderRadius:8,width:32,height:28,fontSize:14,cursor:en?"pointer":"default",fontWeight:700}}>{lbl}</button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editing&&draft&&(
        <Modal onClose={()=>setEditing(false)} title={`✏️ Tiempos · ${route.label}`}>
          <div style={{display:"grid",gap:12}}>
            <div><label style={LBL}>Hora de salida</label><input type="time" value={draft.startTime} onChange={e=>setDraft(d=>({...d,startTime:e.target.value}))} style={INP}/></div>
            <div style={{background:C.cardLight,borderRadius:10,padding:12}}>
              <div style={{fontSize:11,color:C.textMuted,marginBottom:8,fontWeight:700,letterSpacing:"0.05em"}}>PUNTOS OPCIONALES</div>
              <div><label style={LBL}>Partida</label><input value={draft.origin||""} onChange={e=>setDraft(d=>({...d,origin:e.target.value}))} placeholder={globalRoute.origin||"Global"} style={INP}/></div>
              <div style={{marginTop:8}}><label style={LBL}>Destino</label><input value={draft.destination||""} onChange={e=>setDraft(d=>({...d,destination:e.target.value}))} placeholder={globalRoute.destination||"Global"} style={INP}/></div>
            </div>
            {aStops.length>0&&(
              <div style={{background:C.cardLight,borderRadius:10,padding:12}}>
                <div style={{fontSize:11,color:C.textMuted,marginBottom:10,fontWeight:700,letterSpacing:"0.05em"}}>MINUTOS ENTRE PUNTOS</div>
                {[...aStops.map((_,i)=>i)].concat([aStops.length]).map((i)=>{
                  // Construir addresses explícitamente
                  const fromAddr = i===0
                    ? (draft.origin||globalRoute.origin||"")
                    : (clients.find(c=>c.id===aStops[i-1]?.clientId)?.address||"");
                  const toAddr = i<aStops.length
                    ? (clients.find(c=>c.id===aStops[i]?.clientId)?.address||"")
                    : (draft.destination||globalRoute.destination||"");
                  const fromLabel = i===0
                    ? (draft.origin||globalRoute.origin||"Partida")
                    : (clients.find(c=>c.id===aStops[i-1]?.clientId)?.name||aStops[i-1]?.name||"");
                  const toLabel = i<aStops.length
                    ? (clients.find(c=>c.id===aStops[i]?.clientId)?.name||aStops[i]?.name||"")
                    : "Destino";
                  const name=i===0?"Partida":aStops[i-1]?.name;
                  const nextName=i<aStops.length?aStops[i]?.name:"Destino";
                  const cum=draft.legMins.slice(0,i+1).reduce((a,b)=>a+(b||0),0);
                  return (
                    <div key={i} style={{marginBottom:14,background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>
                        {i===0?"🟢 Partida":name} → {nextName}
                      </div>
                      <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
                        {fromAddr&&toAddr?(
                          <button onClick={()=>window.open(g2(fromAddr,toAddr),"_blank")}
                            style={{flex:1,background:C.blue,border:"none",borderRadius:10,padding:"10px",color:"white",fontWeight:800,fontSize:14,cursor:"pointer",WebkitAppearance:"none"}}>
                            🗺 Maps
                          </button>
                        ):(
                          <div style={{flex:1,fontSize:11,color:C.amber,background:"#1a1200",borderRadius:8,padding:"8px 10px",border:"1px solid #4a3a00",textAlign:"center"}}>
                            ⚠ Sin dirección
                          </div>
                        )}
                        <div style={{fontSize:11,color:C.textMuted,flex:2,overflow:"hidden"}}>
                          <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fromAddr||"—"}</div>
                          <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:.7}}>{toAddr||"—"}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <div style={{flex:1}}>
                          <label style={{...LBL,fontSize:10}}>Minutos</label>
                          <input type="number" min="0" value={draft.legMins[i]||""} placeholder="ej: 5" onChange={e=>{const l=[...draft.legMins];l[i]=parseInt(e.target.value)||0;setDraft(d=>({...d,legMins:l}));}} style={INP}/>
                        </div>
                        <div style={{textAlign:"center",paddingTop:18}}>
                          <div style={{fontSize:11,color:C.textMuted}}>Llegada</div>
                          <div style={{fontSize:18,fontWeight:800,color:C.green}}>{addMin(draft.startTime,cum)}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:10,marginTop:18}}>
            <button onClick={()=>setEditing(false)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
            <button onClick={()=>{setRoutes(rs=>rs.map(r=>r.id===draft.id?draft:r));setEditing(false);}} style={{...BTN(C.green,"#0f1a14"),flex:2}}>Guardar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── COBROS ────────────────────────────────────────────────────────────────────
function Cobros({paseos,setPaseos,dogs,clients}){
  const TODAY=getToday();
  const [confirmPay,setConfPay]=useState(null);
  const [ajustes,setAjustes]=useState({});
  const week=weekRange(TODAY);

  const summary=useMemo(()=>clients.map(cl=>{
    const cd=dogs.filter(d=>d.clientId===cl.id);
    return cd.map(dog=>{
      const all=paseos.filter(p=>p.dogId===dog.id);
      const wp=all.filter(p=>p.fecha>=week.from&&p.fecha<=week.to);
      const calc=calcCobro(wp,dog);
      const unpaidW=wp.filter(p=>p.status==="completado"&&!p.paid);
      const unpaidO=all.filter(p=>p.status==="completado"&&!p.paid&&(p.fecha<week.from||p.fecha>week.to));
      const abonadoW=unpaidW.reduce((s,p)=>s+(p.paidAmount||0),0);
      let oldDebt=0;
      if(dog.unitPrice>0){ oldDebt=unpaidO.reduce((s,p)=>s+(p.price-(p.paidAmount||0)),0); }
      else {
        const bw={}; all.filter(p=>p.fecha<week.from||p.fecha>week.to).forEach(p=>{const k=weekRange(p.fecha).from;if(!bw[k])bw[k]=[];bw[k].push(p);});
        Object.values(bw).forEach(sp=>{ if(!sp.some(p=>p.status==="completado"&&!p.paid)) return; const c=calcCobroPaquete(sp,dog); const ab=sp.filter(p=>p.status==="completado"&&!p.paid).reduce((s,p)=>s+(p.paidAmount||0),0); oldDebt+=Math.max(c.cobro-ab,0); });
      }
      return {cl,dog,calc,unpaidW,unpaidO,weekCharge:unpaidW.length>0?Math.max(calc.cobro-abonadoW,0):0,oldAmount:oldDebt};
    });
  }).flat().filter(x=>x.dog.schedule.length>0),[paseos,dogs,clients,week]);

  const byClient=useMemo(()=>{
    const m={};
    summary.forEach(s=>{
      if(!m[s.cl.id]) m[s.cl.id]={cl:s.cl,dogs:[],base:0,ids:[],adjWalks:[]};
      m[s.cl.id].dogs.push(s);
      m[s.cl.id].base+=s.weekCharge+s.oldAmount;
      m[s.cl.id].ids.push(...s.unpaidW.map(p=>p.id),...s.unpaidO.map(p=>p.id));
      if(s.calc.modo==="paquete"&&s.unpaidW.length>0) s.unpaidW.forEach((p,i)=>m[s.cl.id].adjWalks.push({id:p.id,price:i===0?s.calc.cobro:0}));
      else m[s.cl.id].adjWalks.push(...s.unpaidW.map(p=>({id:p.id,price:s.calc.precio||0})));
      if(s.calc.modo==="paquete"&&s.unpaidO.length>0){
        const bw={}; paseos.filter(p=>p.dogId===s.dog.id&&(p.fecha<week.from||p.fecha>week.to)).forEach(p=>{const k=weekRange(p.fecha).from;if(!bw[k])bw[k]=[];bw[k].push(p);});
        Object.values(bw).forEach(sp=>{ if(!sp.some(p=>p.status==="completado"&&!p.paid)) return; const c=calcCobroPaquete(sp,s.dog); sp.filter(p=>p.status==="completado"&&!p.paid).forEach((p,i)=>m[s.cl.id].adjWalks.push({id:p.id,price:i===0?c.cobro:0})); });
      } else m[s.cl.id].adjWalks.push(...s.unpaidO.map(p=>({id:p.id,price:p.price})));
    });
    return Object.values(m);
  },[summary,paseos,week]);

  const adjTotal=(cid,base)=>{ const a=ajustes[cid]; if(!a||!a.val) return base; return a.type==="pct"?Math.round(base*(1-a.val/100)):base+a.val; };
  const totalCobrado=paseos.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.paidAmount||0),0);
  const totalPend=byClient.reduce((s,{cl,base})=>s+Math.max(adjTotal(cl.id,base),0),0);

  const doCollect=({ids,adjWalks,cid,amount,baseAmount})=>{
    // Aplicar ajuste: distribuir diferencia en primer walk con precio > 0
    const diff=(amount||0)-(baseAmount||amount||0);
    const finalWalks=[...adjWalks];
    if(diff!==0){
      const fi=finalWalks.findIndex(w=>w.price>0);
      if(fi!==-1) finalWalks[fi]={...finalWalks[fi],price:Math.max(finalWalks[fi].price+diff,0)};
    }
    setPaseos(ps=>ps.map(p=>{ if(!ids.includes(p.id)) return p; const adj=finalWalks.find(a=>a.id===p.id); return {...p,paid:true,paidAmount:adj!==undefined?adj.price:p.price}; }));
    setAjustes(a=>({...a,[cid]:undefined})); setConfPay(null);
  };
  const doPartial=({ids,adjWalks,cid,parcial,amount,baseAmount})=>{
    const diff=(amount||0)-(baseAmount||amount||0);
    const finalWalks=[...adjWalks];
    if(diff!==0){
      const fi=finalWalks.findIndex(w=>w.price>0);
      if(fi!==-1) finalWalks[fi]={...finalWalks[fi],price:Math.max(finalWalks[fi].price+diff,0)};
    }
    let r=parcial;
    setPaseos(ps=>ps.map(p=>{ if(!ids.includes(p.id)||r<=0) return p; const ae=finalWalks.find(a=>a.id===p.id); const pr=ae!==undefined?ae.price:p.price; const ya=p.paidAmount||0; const d=pr-ya; if(d<=0) return p; const ap=Math.min(r,d); r-=ap; const np=ya+ap; return {...p,paidAmount:np,paid:np>=pr}; }));
    setAjustes(a=>({...a,[cid]:undefined})); setConfPay(null);
  };

  return (
    <div>
      <div style={{fontWeight:800,fontSize:18,color:C.text,marginBottom:4}}>Cobros</div>
      <div style={{fontSize:12,color:C.textMuted,marginBottom:14}}>Semana {week.from} → {week.to}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
        {[{label:"Cobrado",val:totalCobrado,bg:"#14532d",color:C.green},{label:"Por cobrar",val:totalPend,bg:"#451a03",color:C.amber}].map(s=>(
          <div key={s.label} style={{background:s.bg,borderRadius:14,padding:14,border:`1px solid ${s.color}44`}}>
            <div style={{fontSize:11,color:s.color,opacity:.8}}>{s.label}</div>
            <div style={{fontSize:20,fontWeight:800,color:s.color,marginTop:4}}>{ars(s.val)}</div>
          </div>
        ))}
      </div>

      {byClient.map(({cl,dogs:cd,base,ids,adjWalks})=>{
        const aj=ajustes[cl.id]||{type:"pesos",val:0};
        const fin=adjTotal(cl.id,base), dif=fin-base;
        const abonParcial=paseos.filter(p=>ids.includes(p.id)&&(p.paidAmount||0)>0).reduce((s,p)=>s+(p.paidAmount||0),0);
        return (
          <div key={cl.id} style={CARD}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontWeight:800,fontSize:17,color:C.text}}>{cl.name}</div>
                <div style={{fontSize:12,color:C.textMuted}}>{cd.map(x=>x.dog.name).join(", ")}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:C.textMuted}}>Total</div>
                <div style={{fontSize:22,fontWeight:800,color:fin>0?C.amber:C.green}}>{ars(fin)}</div>
                {dif!==0&&<div style={{fontSize:11,color:dif<0?C.green:C.red}}>{dif>0?"+":""}{ars(dif)}</div>}
              </div>
            </div>

            {cd.map(({dog,calc,unpaidW,unpaidO,oldAmount,weekCharge})=>(
              <div key={dog.id} style={{background:C.cardLight,borderRadius:10,padding:12,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:dog.color}}/>
                    <b style={{fontSize:14,color:C.text}}>{dog.name}</b>
                  </div>
                  <b style={{fontSize:14,color:C.green}}>{ars(weekCharge+oldAmount)}</b>
                </div>
                {unpaidW.length>0&&(
                  <div style={{fontSize:12,color:C.textMuted}}>
                    {calc.modo==="unitario"?(
                      <>{calc.realizados} × {ars(calc.precio)} = <span style={{color:C.green,fontWeight:700}}>{ars(calc.cobro)}</span></>
                    ):(
                      <div style={{fontSize:12,lineHeight:1.7}}>
                        <div>Pack contratado: {calc.packContratado}d → {ars(unitPriceFor(calc.packContratado,dog.prices))}/paseo</div>
                        <div>✅ {calc.realizados} realizado{calc.realizados!==1?"s":""}{calc.cxlYo>0?` · 🙋 ${calc.cxlYo} cancelé yo`:""} → pack acumulado {calc.packAcumulado} → {ars(calc.precioAcumulado)}</div>
                        {calc.cxlCliente>0&&<div>😔 {calc.cxlCliente} canceló cliente → no mueve pack</div>}
                        {calc.cxlYo>0&&<div>Descuento: {calc.cxlYo} × {ars(calc.precioUnitCont)} = -{ars(calc.descuentoCxlYo)}</div>}
                        <div style={{fontWeight:700,color:C.green,marginTop:2}}>{ars(calc.precioAcumulado)}{calc.cxlYo>0?` − ${ars(calc.descuentoCxlYo)}`:""} = {ars(calc.cobro)}</div>
                      </div>
                    )}
                  </div>
                )}
                {oldAmount>0&&<div style={{fontSize:12,color:C.red,marginTop:4}}>+ Semanas ant.: {ars(oldAmount)}</div>}
                {!weekCharge&&!oldAmount&&<div style={{fontSize:12,color:C.green}}>✅ Al día</div>}
              </div>
            ))}

            {abonParcial>0&&fin>0&&(
              <div style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                  <span style={{color:C.green}}>Abonado: {ars(abonParcial)}</span>
                  <span style={{color:C.amber}}>Resta: {ars(fin)}</span>
                </div>
                <div style={{background:C.border,borderRadius:20,height:5,overflow:"hidden"}}>
                  <div style={{height:"100%",background:C.green,borderRadius:20,width:`${Math.min((abonParcial/(abonParcial+fin))*100,100)}%`}}/>
                </div>
              </div>
            )}

            {fin>0&&(
              <div style={{background:C.cardLight,borderRadius:10,padding:10,marginBottom:10}}>
                <div style={{fontSize:11,color:C.textMuted,marginBottom:6,fontWeight:700,letterSpacing:"0.05em"}}>AJUSTE MANUAL</div>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <button onClick={()=>setAjustes(a=>({...a,[cl.id]:{...aj,type:"pesos",val:0}}))}
                    style={{flex:1,padding:"8px",borderRadius:10,border:`2px solid ${aj.type==="pesos"?C.green:C.border}`,background:aj.type==="pesos"?C.green+"22":"transparent",color:aj.type==="pesos"?C.green:C.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    + / - $
                  </button>
                  <button onClick={()=>setAjustes(a=>({...a,[cl.id]:{...aj,type:"pct",val:0}}))}
                    style={{flex:1,padding:"8px",borderRadius:10,border:`2px solid ${aj.type==="pct"?C.green:C.border}`,background:aj.type==="pct"?C.green+"22":"transparent",color:aj.type==="pct"?C.green:C.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    % desc.
                  </button>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" value={aj.val||""} placeholder={aj.type==="pct"?"ej: 10":"ej: 5000"} onChange={e=>setAjustes(a=>({...a,[cl.id]:{...aj,val:parseFloat(e.target.value)||0}}))} style={{...INP,flex:1}}/>
                  <button onClick={()=>setAjustes(a=>({...a,[cl.id]:{...aj,val:aj.val?-aj.val:0}}))}
                    style={{flexShrink:0,width:48,height:48,borderRadius:10,border:`2px solid ${aj.val<0?C.red:C.border}`,background:aj.val<0?"#2a0f0f":"transparent",color:aj.val<0?C.red:C.textMuted,fontWeight:800,fontSize:22,cursor:"pointer"}}>
                    −
                  </button>
                </div>
                {aj.val!==0&&<div style={{fontSize:12,color:C.green,marginTop:6,fontWeight:600}}>
                  Base: {ars(base)} {dif>0?"+":" "}{ars(dif)} = <b>{ars(fin)}</b>
                </div>}
              </div>
            )}

            <div style={{display:"flex",gap:8}}>
              {fin>0&&<button onClick={()=>setConfPay({cl,amount:fin,baseAmount:base,ids,adjWalks,cid:cl.id})} style={{...BTN(C.green,"#0f1a14"),flex:2,fontWeight:800}}>💰 Cobrar {ars(fin)}</button>}
              <a href={wa(cl.phone,fin>0?`Hola ${cl.name}! Resumen:\n${cd.map(({dog,calc})=>calc.realizados>0?`🐕 ${dog.name}: ${ars(calc.cobro)}`:"").filter(Boolean).join("\n")}\nTotal: ${ars(fin)} 🐾`:`Hola ${cl.name}, todo al día esta semana 🐾`)} target="_blank" rel="noreferrer"
                style={{...BTN(C.wa,"white"),flex:1,textDecoration:"none",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>💬</a>
            </div>
          </div>
        );
      })}

      {confirmPay&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,borderRadius:20,padding:24,maxWidth:340,width:"100%",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:28,textAlign:"center",marginBottom:8}}>💰</div>
            <div style={{fontWeight:800,fontSize:18,color:C.text,textAlign:"center",marginBottom:4}}>Confirmar cobro</div>
            <div style={{fontSize:14,color:C.textMuted,textAlign:"center",marginBottom:16}}>{confirmPay.cl.name}</div>
            <label style={LBL}>Monto</label>
            <input type="number" value={confirmPay.parcial!==undefined?confirmPay.parcial:confirmPay.amount}
              onChange={e=>setConfPay(p=>({...p,parcial:parseInt(e.target.value)||0}))}
              style={{...INP,fontSize:22,fontWeight:800,textAlign:"right",color:C.green,marginBottom:8}}/>
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[25,50,75,100].map(pct=>(
                <button key={pct} onClick={()=>setConfPay(p=>({...p,parcial:Math.round(p.amount*pct/100)}))}
                  style={{flex:1,background:C.green+"22",border:`1px solid ${C.green}44`,borderRadius:8,padding:"5px 0",fontSize:11,fontWeight:700,color:C.green,cursor:"pointer"}}>{pct}%</button>
              ))}
            </div>
            {confirmPay.parcial!==undefined&&confirmPay.parcial<confirmPay.amount&&<div style={{fontSize:12,color:C.amber,textAlign:"center",marginBottom:8}}>⚠ Pago parcial</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfPay(null)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
              <button onClick={()=>{ const m=confirmPay.parcial!==undefined?confirmPay.parcial:confirmPay.amount; if(m<confirmPay.amount) doPartial({...confirmPay,parcial:m,amount:confirmPay.amount}); else doCollect({...confirmPay,amount:confirmPay.amount}); }} style={{...BTN(C.green,"#0f1a14"),flex:2}}>
                {(()=>{ const m=confirmPay.parcial!==undefined?confirmPay.parcial:confirmPay.amount; return m<confirmPay.amount?`Abonar ${ars(m)}`:`Cobrado ✓`; })()}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CLIENTES ──────────────────────────────────────────────────────────────────
function Clientes({dogs,setDogs,clients,setClients,paseos,setPaseos,onAdd}){

  const [editC,setEditC]=useState(null);
  const [editD,setEditD]=useState(null);
  const [delC,setDelC]=useState(false);
  const [delD,setDelD]=useState(null);
  const [addD,setAddD]=useState(false);
  const emptyDog={name:"",breed:"",notes:"",vet:"",medication:"",emergencyContact:"",walkTime:"08:00",schedule:[],prices:[...DEFAULT_PRICES],unitPrice:0,cancellations:[]};
  const [nDog,setNDog]=useState({...emptyDog});

  const saveEditDog=()=>{ const u=editD; setPaseos(ps=>{const kept=ps.filter(p=>!(p.dogId===u.id&&p.status==="programado"&&p.fecha>=getToday()));return [...kept,...makePaseos(u,kept)];}); setDogs(ds=>ds.map(d=>d.id===u.id?u:d)); setEditD(null); };
  const doAddDog=cId=>{ if(!nDog.name) return; const colors=["#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899","#f97316","#14b8a6"]; const dog={...nDog,id:Date.now(),clientId:cId,color:colors[dogs.length%colors.length]}; setDogs(ds=>[...ds,dog]); setPaseos(ps=>[...ps,...makePaseos(dog,ps)]); setNDog({...emptyDog}); setAddD(false); };
  const doDelDog=id=>{ setDogs(ds=>ds.filter(d=>d.id!==id)); setPaseos(ps=>ps.filter(p=>p.dogId!==id)); setDelD(null); };
  const doDelClient=cId=>{ const ids=dogs.filter(d=>d.clientId===cId).map(d=>d.id); setDogs(ds=>ds.filter(d=>d.clientId!==cId)); setPaseos(ps=>ps.filter(p=>!ids.includes(p.dogId))); setClients(cs=>cs.filter(c=>c.id!==cId)); setSel(null); setDelC(false); };

  if(!sel) return (

        const cd=dogs.filter(d=>d.clientId===c.id);

        return (
          <div key={c.id} onClick={()=>setSel(c.id)} style={{...CARD,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:48,height:48,borderRadius:"50%",background:C.green+"22",border:`2px solid ${C.green}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>👤</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:16,color:C.text}}>{c.name}</div>
              <div style={{fontSize:13,color:C.textMuted}}>{cd.map(d=>d.name).join(", ")||"Sin perros"} · {pw} paseos</div>
            </div>
            <span style={{color:C.textMuted,fontSize:18}}>›</span>
          </div>
        );
      })}
    </div>
  );

  const cl=clients.find(c=>c.id===sel);
  const cd=dogs.filter(d=>d.clientId===sel);
  const aw=paseos.filter(p=>cd.some(d=>d.id===p.dogId));
  const cxls=cd.flatMap(d=>(d.cancellations||[]).map(c=>({...c,dname:d.name}))).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));

  return (
    <div>
      <button onClick={()=>setSel(null)} style={{...BTN("transparent",C.green),padding:"0 0 14px",fontSize:14}}>← Volver</button>
      <div style={CARD}>
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
          <div style={{width:54,height:54,borderRadius:"50%",background:C.green+"22",border:`2px solid ${C.green}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>👤</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:20,color:C.text}}>{cl?.name}</div>
            <div style={{fontSize:13,color:C.textMuted}}>{cl?.phone}</div>
            <div style={{fontSize:12,color:C.textMuted}}>📍 {cl?.address||"Sin dirección"}</div>
          </div>
        </div>
