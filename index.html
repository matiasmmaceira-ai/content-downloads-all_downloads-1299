          <a href={wa(cl?.phone||"",`Hola ${cl?.name}, `)} target="_blank" rel="noreferrer" style={{...BTN(C.wa,"white"),flex:1,textDecoration:"none",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>💬 WhatsApp</a>
        </div>
        <button onClick={()=>setDelC(true)} style={{...BTN("#1a0505","#fca5a5"),width:"100%",marginTop:8,fontSize:13}}>🗑 Eliminar cliente</button>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:15,color:C.text}}>🐕 Perros</div>
        <button onClick={()=>setAddD(true)} style={{...BTN(C.green,"#0f1a14"),padding:"6px 14px",fontSize:13}}>+ Perro</button>
      </div>
      {cd.map(dog=>(
        <div key={dog.id} style={CARD}>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:dog.color+"22",border:`2.5px solid ${dog.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🐕</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:16,color:C.text}}>{dog.name}</div>
              <div style={{fontSize:13,color:C.textMuted}}>{dog.breed||"—"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,color:C.green,fontSize:16}}>{ars(dog.unitPrice>0?dog.unitPrice:priceFor(dog.schedule.length,dog.prices))}</div>
              <div style={{fontSize:11,color:C.textMuted}}>{dog.unitPrice>0?"por paseo":`${dog.schedule.length}d/sem`}</div>
            </div>
          </div>
          {dog.schedule.length>0&&(
            <div style={{background:C.cardLight,borderRadius:8,padding:"8px 10px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {dog.schedule.map(d=><span key={d} style={{background:C.green,color:"#0f1a14",fontSize:12,padding:"2px 8px",borderRadius:12,fontWeight:700}}>{DAYS_ES[d]}</span>)}
              </div>
              {dog.walkTime&&<span style={{fontSize:12,color:C.textMuted}}>🕐 {dog.walkTime}</span>}
            </div>
          )}
          {(dog.vet||dog.medication||dog.emergencyContact)&&(
            <div style={{background:"#1a0f0f",borderRadius:8,padding:"8px 10px",marginBottom:8,border:"1px solid #4a1515"}}>
              <div style={{fontSize:10,color:"#fca5a5",fontWeight:700,marginBottom:4,letterSpacing:"0.05em"}}>🚨 EMERGENCIA</div>
              {dog.vet&&<div style={{fontSize:12,color:C.textMuted}}>🏥 {dog.vet}</div>}
              {dog.medication&&<div style={{fontSize:12,color:C.textMuted}}>💊 {dog.medication}</div>}
              {dog.emergencyContact&&<div style={{fontSize:12,color:C.textMuted}}>📞 {dog.emergencyContact}</div>}
            </div>
          )}
          {dog.notes&&<div style={{background:"#1a1200",borderRadius:8,padding:"8px 10px",marginBottom:8,border:"1px solid #4a3a00"}}><div style={{fontSize:10,color:C.amber,fontWeight:700,letterSpacing:"0.05em"}}>NOTAS</div><div style={{fontSize:12,color:C.textMuted,marginTop:2}}>📝 {dog.notes}</div></div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setEditD({...dog,schedule:[...dog.schedule],prices:[...dog.prices]})} style={{...BTN(C.cardLight,C.textMuted),flex:1,fontSize:13}}>✏️ Editar</button>
            <button onClick={()=>setDelD(dog.id)} style={{...BTN("#1a0505","#fca5a5"),flex:1,fontSize:13}}>🗑</button>
          </div>
        </div>
      ))}

      {cxls.length>0&&(
        <div style={CARD}>
          <div style={{fontSize:11,color:C.textMuted,fontWeight:700,marginBottom:10,letterSpacing:"0.05em"}}>CANCELACIONES</div>
          {cxls.map((c,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:8,marginBottom:8,borderBottom:i<cxls.length-1?`1px solid ${C.border}`:"none"}}>
              <div><div style={{fontSize:13,fontWeight:600,color:C.text}}>{c.dname} · {c.fecha}</div><div style={{fontSize:11,color:C.textMuted}}>{c.nota}</div></div>
              <Tag bg={c.by==="client"?"#2a0f0f":"#0f1a2a"} color={c.by==="client"?"#fca5a5":"#93c5fd"}>{c.by==="client"?"Cliente":"Yo"}</Tag>
            </div>
          ))}
        </div>
      )}

      {editC&&(
        <Modal onClose={()=>setEditC(null)} title={`✏️ ${editC.name}`}>
          <div style={{display:"grid",gap:12}}>
            {[{k:"name",l:"Nombre"},{k:"phone",l:"WhatsApp"},{k:"address",l:"Dirección"}].map(f=>(
              <div key={f.k}><label style={LBL}>{f.l}</label><input value={editC[f.k]||""} onChange={e=>setEditC(c=>({...c,[f.k]:e.target.value}))} style={INP}/></div>
            ))}
            <div style={{background:C.cardLight,borderRadius:10,padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:11,color:C.textMuted,fontWeight:700,letterSpacing:"0.05em"}}>CONTACTOS ADICIONALES</div>
                <button onClick={()=>setEditC(c=>({...c,contacts:[...(c.contacts||[]),{name:"",phone:""}]}))} style={{...BTN(C.green,"#0f1a14"),padding:"4px 10px",fontSize:12}}>+ Agregar</button>
              </div>
              {!(editC.contacts||[]).length&&<div style={{fontSize:12,color:C.textMuted}}>Sin contactos</div>}
              {(editC.contacts||[]).map((ct,i)=>(
                <div key={i} style={{background:C.card,borderRadius:8,padding:10,marginBottom:6}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
                    <div><label style={{...LBL,fontSize:10}}>Nombre</label><input value={ct.name} onChange={e=>{const cs=[...(editC.contacts||[])];cs[i]={...cs[i],name:e.target.value};setEditC(c=>({...c,contacts:cs}));}} style={{...INP,padding:"7px 10px",fontSize:13}}/></div>
                    <div><label style={{...LBL,fontSize:10}}>WhatsApp</label><input value={ct.phone} onChange={e=>{const cs=[...(editC.contacts||[])];cs[i]={...cs[i],phone:e.target.value};setEditC(c=>({...c,contacts:cs}));}} style={{...INP,padding:"7px 10px",fontSize:13}}/></div>
                  </div>
                  <button onClick={()=>{const cs=[...(editC.contacts||[])];cs.splice(i,1);setEditC(c=>({...c,contacts:cs}));}} style={{...BTN("#1a0505","#fca5a5"),width:"100%",padding:"5px",fontSize:12}}>🗑</button>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={()=>setEditC(null)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
            <button onClick={()=>{setClients(cs=>cs.map(c=>c.id===editC.id?editC:c));setEditC(null);}} style={{...BTN(C.green,"#0f1a14"),flex:2}}>Guardar</button>
          </div>
        </Modal>
      )}

      {editD&&(
        <Modal onClose={()=>setEditD(null)} title={`✏️ ${editD.name}`}>
          <div style={{display:"grid",gap:12}}>
            {[{k:"name",l:"Nombre"},{k:"breed",l:"Raza"},{k:"notes",l:"Notas / comportamiento"}].map(f=>(
              <div key={f.k}><label style={LBL}>{f.l}</label><input value={editD[f.k]||""} onChange={e=>setEditD(d=>({...d,[f.k]:e.target.value}))} style={INP}/></div>
            ))}
            <ScheduleEditor schedule={editD.schedule} onChange={s=>setEditD(d=>({...d,schedule:s}))}/>
            <PriceEditor prices={editD.prices} unitPrice={editD.unitPrice||0} onChange={p=>setEditD(d=>({...d,prices:p}))} onChangeUnit={v=>setEditD(d=>({...d,unitPrice:v}))}/>
            <EmergencyEditor dog={editD} onChange={d=>setEditD(d)}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={()=>setEditD(null)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
            <button onClick={saveEditDog} style={{...BTN(C.green,"#0f1a14"),flex:2}}>Guardar</button>
          </div>
        </Modal>
      )}

      {addD&&(
        <Modal onClose={()=>setAddD(false)} title={`🐕 Nuevo perro · ${cl?.name}`}>
          <div style={{display:"grid",gap:12}}>
            {[{k:"name",l:"Nombre *",p:"Max"},{k:"breed",l:"Raza",p:"Labrador"},{k:"notes",l:"Notas",p:"Comportamiento..."}].map(f=>(
              <div key={f.k}><label style={LBL}>{f.l}</label><input value={nDog[f.k]} onChange={e=>setNDog(d=>({...d,[f.k]:e.target.value}))} placeholder={f.p} style={INP}/></div>
            ))}
            <ScheduleEditor schedule={nDog.schedule} onChange={s=>setNDog(d=>({...d,schedule:s}))}/>
            <PriceEditor prices={nDog.prices} unitPrice={nDog.unitPrice||0} onChange={p=>setNDog(d=>({...d,prices:p}))} onChangeUnit={v=>setNDog(d=>({...d,unitPrice:v}))}/>
            <EmergencyEditor dog={nDog} onChange={d=>setNDog(d)}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={()=>setAddD(false)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
            <button onClick={()=>doAddDog(sel)} style={{...BTN(C.green,"#0f1a14"),flex:2}}>Añadir</button>
          </div>
        </Modal>
      )}

      {delC&&<Confirm icon="🗑" title={`¿Eliminar a ${cl?.name}?`} sub="Se eliminan todos sus perros y paseos." onConfirm={()=>doDelClient(sel)} onCancel={()=>setDelC(false)} danger/>}
      {delD&&<Confirm icon="🗑" title={`¿Eliminar a ${dogs.find(d=>d.id===delD)?.name}?`} sub="Se eliminan sus paseos también." onConfirm={()=>doDelDog(delD)} onCancel={()=>setDelD(null)} danger/>}
    </div>
  );
}

// ── RESUMEN ───────────────────────────────────────────────────────────────────
function Resumen({paseos,dogs,clients,selWeek,onChangeWeek,selMes,onChangeMes,seccion,onChangeSeccion}){
  const TODAY=getToday();
  const wr=weekRange(selWeek);
  const wp=paseos.filter(p=>p.fecha>=wr.from&&p.fecha<=wr.to);
  const wReal=wp.filter(p=>p.status==="completado");
  const wCxlCli=wp.filter(p=>p.status==="cancelado"&&p.cancelBy==="client");
  const wCxlYo=wp.filter(p=>p.status==="cancelado"&&p.cancelBy==="me");
  const wProg=wp.filter(p=>p.status==="programado");
  const isCurW=wr.from===weekRange(TODAY).from;

  const ingresoSemana=useMemo(()=>{ return wp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.paidAmount||0),0); },[wp]);
  const ingresoPotencial=useMemo(()=>{ if(!wp.some(p=>p.status!=="programado")) return 0; let t=0; dogs.forEach(dog=>{if(!wp.some(p=>p.dogId===dog.id)||!dog.schedule.length) return; t+=dog.unitPrice>0?dog.unitPrice*dog.schedule.length:priceFor(dog.schedule.length,dog.prices);}); return t; },[dogs,wp]);

  const mp=paseos.filter(p=>p.fecha.startsWith(selMes));
  const mReal=mp.filter(p=>p.status==="completado");
  const mCxlCli=mp.filter(p=>p.status==="cancelado"&&p.cancelBy==="client");
  const mCxlYo=mp.filter(p=>p.status==="cancelado"&&p.cancelBy==="me");
  const isCurM=selMes===TODAY.slice(0,7);
  const ingresoMes=useMemo(()=>mp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.paidAmount||0),0),[mp]);

  const semanasDelMes=useMemo(()=>{ const [y,m]=selMes.split("-").map(Number),seen=new Set(),res=[]; for(let d=1;d<=31;d++){const f=`${y}-${pad2(m)}-${pad2(d)}`;if(!f.startsWith(selMes))break;const w=weekRange(f);if(!seen.has(w.from)){seen.add(w.from);res.push(w);}} return res; },[selMes]);

  const clienteStats=useMemo(()=>clients.map(cl=>{
    const cd=dogs.filter(d=>d.clientId===cl.id), cp=paseos.filter(p=>cd.some(d=>d.id===p.dogId));
    const realizados=cp.filter(p=>p.status==="completado").length, cxlCli=cp.filter(p=>p.status==="cancelado"&&p.cancelBy==="client").length;
    const cobrado=cp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.paidAmount||0),0);
    let deuda=0;
    cd.forEach(dog=>{ const dp=cp.filter(p=>p.dogId===dog.id); if(dog.unitPrice>0){dp.filter(p=>p.status==="completado"&&!p.paid).forEach(p=>{deuda+=p.price-(p.paidAmount||0);});}
    else{const bw={};dp.forEach(p=>{const k=weekRange(p.fecha).from;if(!bw[k])bw[k]=[];bw[k].push(p);});Object.values(bw).forEach(sp=>{if(!sp.some(p=>p.status==="completado"&&!p.paid))return;const c=calcCobroPaquete(sp,dog);const ab=sp.filter(p=>p.status==="completado"&&!p.paid).reduce((s,p)=>s+(p.paidAmount||0),0);deuda+=Math.max(c.cobro-ab,0);});}});
    return {cl,cd,realizados,cxlCli,cobrado,deuda};
  }).filter(x=>x.cd.length>0).sort((a,b)=>b.cobrado-a.cobrado),[clients,dogs,paseos]);

  const perroStats=useMemo(()=>dogs.map(dog=>{ const dp=paseos.filter(p=>p.dogId===dog.id), cl=clients.find(c=>c.id===dog.clientId); return {dog,cl,realizados:dp.filter(p=>p.status==="completado").length,cxlCli:dp.filter(p=>p.status==="cancelado"&&p.cancelBy==="client").length,cobrado:dp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.paidAmount||0),0)}; }).filter(x=>x.dog.schedule.length>0).sort((a,b)=>b.cobrado-a.cobrado),[dogs,clients,paseos]);

  const SECS=[{id:"semana",label:"Semana",icon:"📅"},{id:"mes",label:"Mes",icon:"📆"},{id:"clientes",label:"Clientes",icon:"👤"},{id:"perros",label:"Perros",icon:"🐕"}];
  const NavBar=({label,onPrev,onNext,isCurrent})=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,...CARD,padding:"10px 14px"}}>
      <button onClick={onPrev} style={{...BTN(C.cardLight,C.green),padding:"5px 12px",fontSize:18}}>‹</button>
      <div style={{textAlign:"center"}}><div style={{fontWeight:800,fontSize:14,color:C.text}}>{label}</div>{isCurrent&&<div style={{fontSize:11,color:C.green}}>← actual</div>}</div>
      <button onClick={onNext} style={{...BTN(C.cardLight,C.green),padding:"5px 12px",fontSize:18}}>›</button>
    </div>
  );

  return (
    <div>
      <div style={{fontWeight:800,fontSize:18,color:C.text,marginBottom:14}}>📊 Resúmenes</div>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {SECS.map(s=>(
          <button key={s.id} onClick={()=>onChangeSeccion(s.id)}
            style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:`1px solid ${seccion===s.id?C.green:C.border}`,cursor:"pointer",
              background:seccion===s.id?C.green+"22":"transparent",color:seccion===s.id?C.green:C.textMuted,fontSize:13,fontWeight:seccion===s.id?700:400}}>
            {s.icon} {s.label}
          </button>
        ))}
      </div>

      {seccion==="semana"&&(
        <div>
          <NavBar label={`${wr.from.slice(5)} → ${wr.to.slice(5)}`} onPrev={()=>onChangeWeek(addWeeks(selWeek,-1))} onNext={()=>onChangeWeek(addWeeks(selWeek,1))} isCurrent={isCurW}/>
          <div style={{background:"#14532d",borderRadius:16,padding:18,marginBottom:12,border:"1px solid #166534"}}>
            <div style={{fontSize:12,color:C.green,opacity:.8,marginBottom:4}}>Ingreso de la semana</div>
            <div style={{fontSize:32,fontWeight:800,color:C.green}}>{ars(ingresoSemana)}</div>
            {ingresoPotencial>0&&(<>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:12,borderTop:`1px solid ${C.green}44`,paddingTop:12}}>
                <div><div style={{fontSize:11,color:C.green,opacity:.7}}>Potencial</div><div style={{fontSize:16,fontWeight:700,color:C.text}}>{ars(ingresoPotencial)}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:11,color:C.red,opacity:.7}}>Perdido</div><div style={{fontSize:16,fontWeight:700,color:C.red}}>{ars(Math.max(ingresoPotencial-ingresoSemana,0))}</div></div>
              </div>
              <div style={{marginTop:10}}><div style={{background:"rgba(255,255,255,.1)",borderRadius:20,height:5,overflow:"hidden"}}><div style={{height:"100%",background:C.green,borderRadius:20,width:`${Math.min((ingresoSemana/ingresoPotencial)*100,100)}%`}}/></div></div>
            </>)}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[{icon:"✅",label:"Realizados",v:wReal.length,c:C.green},{icon:"😔",label:"Cxl cliente",v:wCxlCli.length,c:C.red},{icon:"🙋",label:"Cxl yo",v:wCxlYo.length,c:C.blue}].map(s=>(
              <div key={s.label} style={{...CARD,flex:1,textAlign:"center",padding:"12px 6px",marginBottom:0}}>
                <div style={{fontSize:18}}>{s.icon}</div>
                <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
                <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>

          <div style={CARD}>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>Desglose por perro</div>
            {!dogs.filter(dog=>wp.some(p=>p.dogId===dog.id)).length&&<div style={{textAlign:"center",padding:16,color:C.textMuted,fontSize:13}}>Sin paseos esta semana</div>}
            {dogs.filter(dog=>wp.some(p=>p.dogId===dog.id)).map(dog=>{
              const dp=wp.filter(p=>p.dogId===dog.id), c=calcCobro(dp,dog), cl=clients.find(x=>x.id===dog.clientId);
              return (
                <div key={dog.id} style={{display:"flex",alignItems:"center",gap:10,paddingBottom:10,marginBottom:10,borderBottom:`1px solid ${C.border}`}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:dog.color,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.text}}>{dog.name} <span style={{color:C.textMuted,fontSize:11}}>— {cl?.name}</span></div>
                    <div style={{fontSize:11,color:C.textMuted}}>✅{c.realizados}{c.cxlCliente>0?` 😔${c.cxlCliente}`:""}{c.cxlYo>0?` 🙋${c.cxlYo}`:""}</div>
                  </div>
                  <div style={{fontWeight:800,color:C.green,fontSize:14}}>{ars(c.cobro)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {seccion==="mes"&&(
        <div>
          <NavBar label={`${MONTHS_ES[parseInt(selMes.split("-")[1])-1]} ${selMes.split("-")[0]}`} onPrev={()=>onChangeMes(addMonths(selMes,-1))} onNext={()=>onChangeMes(addMonths(selMes,1))} isCurrent={isCurM}/>
          <div style={{background:"#1e3a5f",borderRadius:16,padding:18,marginBottom:12,border:"1px solid #1d4ed8"}}>
            <div style={{fontSize:12,color:C.blue,opacity:.8,marginBottom:4}}>Ingreso del mes</div>
            <div style={{fontSize:32,fontWeight:800,color:C.text}}>{ars(ingresoMes)}</div>
            <div style={{display:"flex",gap:20,marginTop:12,borderTop:`1px solid ${C.blue}44`,paddingTop:12}}>
              {[{l:"Realizados",v:mReal.length,c:C.green},{l:"Cxl cliente",v:mCxlCli.length,c:"#fca5a5"},{l:"Cxl yo",v:mCxlYo.length,c:"#93c5fd"}].map(s=>(
                <div key={s.l}><div style={{fontSize:11,color:C.textMuted}}>{s.l}</div><div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div></div>
              ))}
            </div>
          </div>
          <div style={CARD}>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>Semana a semana</div>
            {semanasDelMes.map(wr2=>{
              let ing=0; dogs.forEach(dog=>{const dp=paseos.filter(p=>p.dogId===dog.id&&p.fecha>=wr2.from&&p.fecha<=wr2.to);if(dp.length)ing+=calcCobro(dp,dog).cobro;});
              const real=paseos.filter(p=>p.fecha>=wr2.from&&p.fecha<=wr2.to&&p.status==="completado").length;
              const cxlC=paseos.filter(p=>p.fecha>=wr2.from&&p.fecha<=wr2.to&&p.status==="cancelado"&&p.cancelBy==="client").length;
              const isCurr=wr2.from===weekRange(TODAY).from, isFut=wr2.from>weekRange(TODAY).from;
              return (
                <div key={wr2.from} onClick={()=>{onChangeWeek(wr2.from);onChangeSeccion("semana");}}
                  style={{display:"flex",alignItems:"center",gap:10,paddingBottom:10,marginBottom:10,borderBottom:`1px solid ${C.border}`,opacity:isFut?.4:1,cursor:"pointer"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:isCurr?800:600,fontSize:13,color:isCurr?C.green:C.text}}>{wr2.from.slice(5)} → {wr2.to.slice(5)}{isCurr?" ← actual":""}</div>
                    <div style={{fontSize:11,color:C.textMuted}}>✅{real}{cxlC>0?` 😔${cxlC}`:""}</div>
                  </div>
                  <div style={{fontWeight:800,fontSize:14,color:isCurr?C.green:C.text}}>{ars(ing)}</div>
                  <span style={{color:C.textMuted}}>›</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {seccion==="clientes"&&(
        <div>
          <div style={CARD}>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>🏆 Ranking por ingresos</div>
            {clienteStats.map((s,i)=>(
              <div key={s.cl.id} style={{display:"flex",gap:10,paddingBottom:12,marginBottom:12,borderBottom:i<clienteStats.length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:C.cardLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0,color:C.text}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text}}>{s.cl.name}</div>
                  <div style={{fontSize:12,color:C.textMuted}}>{s.cd.map(d=>d.name).join(", ")} · {s.realizados} paseos</div>
                  {s.deuda>0&&<Tag bg="#1a1200" color={C.amber}>💰 debe {ars(s.deuda)}</Tag>}
                </div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:800,color:C.green,fontSize:15}}>{ars(s.cobrado)}</div><div style={{fontSize:10,color:C.textMuted}}>cobrado</div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {seccion==="perros"&&(
        <div>
          <div style={CARD}>
            <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:10}}>🐕 Todos los perros</div>
            {perroStats.map((s,i)=>(
              <div key={s.dog.id} style={{display:"flex",alignItems:"center",gap:10,paddingBottom:10,marginBottom:10,borderBottom:i<perroStats.length-1?`1px solid ${C.border}`:"none"}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:s.dog.color+"22",border:`2px solid ${s.dog.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🐕</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text}}>{s.dog.name} <span style={{color:C.textMuted,fontSize:11}}>— {s.cl?.name}</span></div>
                  <div style={{fontSize:11,color:C.textMuted}}>{s.dog.schedule.length}d/sem · ✅{s.realizados}{s.cxlCli>0?` 😔${s.cxlCli}`:""}</div>
                </div>
                <div style={{fontWeight:800,color:C.green,fontSize:14}}>{ars(s.cobrado)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const TODAY=getToday();
  const [dogs,setDogs]        = usePersisted("pc_dogs",    INIT_DOGS);
  const [clients,setClients]  = usePersisted("pc_clients", INIT_CLIENTS);
  const [routes,setRoutes]    = usePersisted("pc_routes",  INIT_ROUTES);
  const [global,setGlobal]    = usePersisted("pc_global",  {origin:"",destination:""});
  // Paseos: nunca null. Si localStorage no tiene nada, genera desde los perros.
  const [paseos,setPaseos]    = usePersisted("pc_paseos", ()=>initPaseos(loadLS("pc_dogs",INIT_DOGS)));

  const realPaseos = Array.isArray(paseos) ? paseos : initPaseos(dogs);

  const [tab,setTab]=useState("agenda");
  const [addWalk,setAddWalk]=useState(null);
  const [addClient,setAddClient]=useState(false);
  const [nClient,setNClient]=useState({name:"",phone:"",address:"",contacts:[]});
  const [nWalk,setNWalk]=useState({dogId:"",fecha:TODAY});
  const [resSelWeek,setResSelWeek]=useState(weekRange(TODAY).from);
  const [resSelMes,setResSelMes]=useState(TODAY.slice(0,7));
  const [resSeccion,setResSeccion]=useState("semana");

  const week=weekRange(TODAY);
  const totalCobrado=useMemo(()=>realPaseos.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.paidAmount||0),0),[realPaseos]);
  const weekPending=useMemo(()=>{ let t=0; dogs.forEach(dog=>{const wp=realPaseos.filter(p=>p.dogId===dog.id&&p.fecha>=week.from&&p.fecha<=week.to); const unpaid=wp.filter(p=>p.status==="completado"&&!p.paid); if(!unpaid.length) return; const c=calcCobro(wp,dog); const ab=unpaid.reduce((s,p)=>s+(p.paidAmount||0),0); t+=Math.max(c.cobro-ab,0);}); return t; },[realPaseos,dogs]);
  const hoyCount=useMemo(()=>{ const ids=new Set(); realPaseos.filter(p=>p.fecha===TODAY&&p.status!=="cancelado").forEach(p=>ids.add(p.dogId)); return ids.size; },[realPaseos,TODAY]);

  const fechaHoy=useMemo(()=>{ const f=new Date(TODAY+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); return f.charAt(0).toUpperCase()+f.slice(1); },[TODAY]);

  const getDog=id=>dogs.find(d=>d.id===id);
  const doAddClient=()=>{ if(!nClient.name) return; setClients(cs=>[...cs,{...nClient,id:Date.now()}]); setNClient({name:"",phone:"",address:"",contacts:[]}); setAddClient(false); };
  const doAddWalk=()=>{ if(!nWalk.dogId||!nWalk.fecha) return; const dog=getDog(parseInt(nWalk.dogId)); const freq=dog?.schedule?.length||0; const price=dog?.unitPrice>0?dog.unitPrice:priceFor(freq,dog?.prices); setPaseos(ps=>[...ps,{id:Date.now(),dogId:parseInt(nWalk.dogId),clientId:dog?.clientId,fecha:nWalk.fecha,status:"programado",cancelBy:null,paid:false,paidAmount:0,freq,price,manual:true}]); setNWalk({dogId:"",fecha:TODAY}); setAddWalk(null); };

  const [showBackup,setShowBackup]=useState(false);
  const [importTxt,setImportTxt]=useState("");
  const [importErr,setImportErr]=useState("");
  const [importOk,setImportOk]=useState(false);

  const doExport=()=>{
    const data={v:1,ts:new Date().toISOString(),dogs,clients,routes,global:global,paseos:realPaseos};
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`PaseoCan-backup-${getToday()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const doImport=()=>{
    setImportErr(""); setImportOk(false);
    try{
      const data=JSON.parse(importTxt);
      if(!data.dogs||!data.clients||!data.paseos) throw new Error("Archivo inválido");
      if(data.dogs) setDogs(data.dogs);
      if(data.clients) setClients(data.clients);
      if(data.routes) setRoutes(data.routes);
      if(data.global) setGlobal(data.global);
      if(data.paseos) setPaseos(data.paseos);
      setImportOk(true);
      setImportTxt("");
      setTimeout(()=>{setShowBackup(false);setImportOk(false);},1500);
    }catch(e){ setImportErr("El archivo no es válido. Pegá el contenido del JSON."); }
  };

  const doImportFile=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ setImportTxt(ev.target.result); };
    reader.readAsText(file);
  };

  const TABS=[{id:"agenda",icon:"📅",label:"Agenda"},{id:"clientes",icon:"🐕",label:"Clientes"},{id:"rutas",icon:"🗺",label:"Rutas"},{id:"cobros",icon:"💳",label:"Cobros"},{id:"resumen",icon:"📊",label:"Resumen"}];

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",color:C.text}}>
      {/* Header */}
      <div style={{background:"linear-gradient(160deg,#052e16,#14532d,#166534)",padding:"22px 18px 16px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-0.02em"}}>🐾 PaseoCan</div>
              <button onClick={()=>setShowBackup(true)} style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:8,padding:"4px 8px",fontSize:12,color:C.textMuted,cursor:"pointer",fontWeight:600}}>💾</button>
            </div>
            <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{fechaHoy}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:C.textMuted}}>Cobrado total</div>
            <div style={{fontSize:18,fontWeight:800,color:C.green}}>{ars(totalCobrado)}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          {[{l:"Hoy",v:hoyCount,i:"🦮"},{l:"Clientes",v:clients.length,i:"👤"},{l:"Esta sem.",v:ars(weekPending),i:"💰"}].map(s=>(
            <div key={s.l} style={{flex:1,background:"rgba(255,255,255,.07)",borderRadius:12,padding:"10px 6px",textAlign:"center",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:18}}>{s.i}</div>
              <div style={{fontSize:s.l==="Esta sem."?11:18,fontWeight:800,color:C.text,lineHeight:1.2}}>{s.v}</div>
              <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:"10px 2px 8px",border:"none",background:"none",cursor:"pointer",
              fontSize:9,fontWeight:tab===t.id?800:500,color:tab===t.id?C.green:C.textMuted,
              borderBottom:`2px solid ${tab===t.id?C.green:"transparent"}`,
              display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color .15s"}}>
            <span style={{fontSize:17}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* Contenido */}
      <div style={{padding:16}}>
        {tab==="agenda"   &&<Agenda    paseos={realPaseos} setPaseos={setPaseos} dogs={dogs} setDogs={setDogs} clients={clients} onAdd={f=>{setNWalk(w=>({...w,fecha:f}));setAddWalk(f);}}/>}
        {tab==="clientes" &&<Clientes  dogs={dogs} setDogs={setDogs} clients={clients} setClients={setClients} paseos={realPaseos} setPaseos={setPaseos} onAdd={()=>setAddClient(true)}/>}
        {tab==="rutas"    &&<Rutas     routes={routes} setRoutes={setRoutes} dogs={dogs} clients={clients} paseos={realPaseos} globalRoute={global} setGlobalRoute={setGlobal}/>}
        {tab==="cobros"   &&<Cobros    paseos={realPaseos} setPaseos={setPaseos} dogs={dogs} clients={clients}/>}
        {tab==="resumen"  &&<Resumen   paseos={realPaseos} dogs={dogs} clients={clients} selWeek={resSelWeek} onChangeWeek={setResSelWeek} selMes={resSelMes} onChangeMes={setResSelMes} seccion={resSeccion} onChangeSeccion={setResSeccion}/>}
      </div>

      {/* Modal nuevo cliente */}
      {addClient&&(
        <Modal onClose={()=>setAddClient(false)} title="👤 Nuevo cliente">
          <div style={{display:"grid",gap:12}}>
            <div><label style={LBL}>Nombre *</label><input value={nClient.name} onChange={e=>setNClient(c=>({...c,name:e.target.value}))} placeholder="María García" style={INP}/></div>
            <div><label style={LBL}>WhatsApp</label><input value={nClient.phone} onChange={e=>setNClient(c=>({...c,phone:e.target.value}))} placeholder="5491112345678" style={INP}/></div>
            <div><label style={LBL}>Dirección</label><input value={nClient.address} onChange={e=>setNClient(c=>({...c,address:e.target.value}))} placeholder="Av. Corrientes 1234" style={INP}/>
              {nClient.address&&<a href={gMaps(nClient.address)} target="_blank" rel="noreferrer" style={{display:"block",marginTop:6,background:C.green+"22",color:C.green,borderRadius:8,padding:"7px",fontSize:13,fontWeight:700,textDecoration:"none",textAlign:"center"}}>🗺 Verificar</a>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={()=>setAddClient(false)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
            <button onClick={doAddClient} style={{...BTN(C.green,"#0f1a14"),flex:2}}>Crear cliente</button>
          </div>
        </Modal>
      )}

      {/* Modal nuevo paseo */}
      {addWalk&&(
        <Modal onClose={()=>setAddWalk(null)} title="🦮 Nuevo paseo">
          <div style={{display:"grid",gap:12}}>
            <div><label style={LBL}>Perro *</label>
              <select value={nWalk.dogId} onChange={e=>setNWalk(w=>({...w,dogId:e.target.value}))} style={INP}>
                <option value="">Seleccionar perro</option>
                {dogs.map(d=>{const cl=clients.find(c=>c.id===d.clientId);return <option key={d.id} value={d.id}>{d.name} — {cl?.name}</option>;})}
              </select>
            </div>
            <div><label style={LBL}>Fecha</label><input type="date" value={nWalk.fecha} onChange={e=>setNWalk(w=>({...w,fecha:e.target.value}))} style={INP}/>
              {nWalk.fecha&&(()=>{const wr=weekRange(nWalk.fecha);return <div style={{fontSize:11,color:C.textMuted,marginTop:4}}>📅 Semana: {wr.from} → {wr.to}</div>;})()}
            </div>
            {nWalk.dogId&&(()=>{
              const dog=getDog(parseInt(nWalk.dogId));
              const wr=weekRange(nWalk.fecha||getToday());
              const wpPreview=paseos.filter(p=>p.dogId===dog?.id&&p.fecha>=wr.from&&p.fecha<=wr.to);
              const rPreview=wpPreview.filter(p=>p.status==="completado").length+1; // +1 this manual
              const cyPreview=wpPreview.filter(p=>p.status==="cancelado"&&p.cancelBy==="me").length;
              const packAc=Math.min(rPreview+cyPreview,5);
              const price=dog?.unitPrice>0?dog.unitPrice:priceFor(packAc,dog?.prices);
              const pu=unitPriceFor(dog?.schedule?.length||1,dog?.prices);
              return (
                <div style={{background:C.green+"22",borderRadius:8,padding:"10px 12px",fontSize:13,color:C.green,fontWeight:600}}>
                  <div>Pack acumulado con este paseo: {packAc}d → {ars(price)}</div>
                  {dog?.unitPrice===0&&<div style={{fontSize:11,marginTop:2,opacity:.8}}>Precio unitario pack contratado: {ars(pu)}/paseo</div>}
                </div>
              );
            })()}
          </div>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={()=>setAddWalk(null)} style={{...BTN(C.cardLight,C.textMuted),flex:1}}>Cancelar</button>
            <button onClick={doAddWalk} style={{...BTN(C.green,"#0f1a14"),flex:2}}>Añadir</button>
          </div>
        </Modal>
      )}
      {/* Modal backup */}
      {showBackup&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:500,display:"flex",alignItems:"flex-start",overflowY:"auto"}} onClick={()=>{setShowBackup(false);setImportErr("");setImportOk(false);}}>
          <div style={{background:C.card,borderRadius:"0 0 24px 24px",padding:24,width:"100%",maxWidth:480,margin:"0 auto",boxSizing:"border-box",border:`1px solid ${C.border}`,borderTop:"none"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:18,color:C.text,marginBottom:4}}>💾 Backup de datos</div>
            <div style={{fontSize:13,color:C.textMuted,marginBottom:20}}>Guardá una copia o restaurá desde un backup anterior.</div>

            <div style={{background:C.cardLight,borderRadius:14,padding:16,marginBottom:14,border:`1px solid ${C.border}`}}>
              <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:4}}>📤 Exportar</div>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:10}}>Descarga un archivo JSON con todos tus datos: clientes, perros, paseos y cobros.</div>
              <button onClick={doExport} style={{background:C.green,color:"#0f1a14",border:"none",borderRadius:12,padding:"11px 16px",fontSize:14,fontWeight:800,cursor:"pointer",width:"100%"}}>⬇️ Descargar backup</button>
            </div>

            <div style={{background:C.cardLight,borderRadius:14,padding:16,marginBottom:14,border:`1px solid ${C.border}`}}>
              <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:4}}>📥 Importar</div>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:10}}>Restaurá desde un backup. <b style={{color:C.red}}>Reemplaza todos los datos actuales.</b></div>
              <label style={{display:"block",background:C.cardLight,border:`1.5px dashed ${C.border}`,borderRadius:10,padding:"12px",textAlign:"center",cursor:"pointer",marginBottom:10,fontSize:13,color:C.textMuted}}>
                📁 Seleccionar archivo JSON
                <input type="file" accept=".json,application/json" onChange={doImportFile} style={{display:"none"}}/>
              </label>
              {importTxt&&!importOk&&(
                <div>
                  <div style={{fontSize:12,color:C.green,marginBottom:8,fontWeight:600}}>✓ Archivo cargado. Tocá importar para confirmar.</div>
                  <button onClick={doImport} style={{background:"#7f1d1d",color:"#fca5a5",border:"1px solid #4a1515",borderRadius:12,padding:"11px 16px",fontSize:14,fontWeight:800,cursor:"pointer",width:"100%"}}>⚠️ Importar y reemplazar datos</button>
                </div>
              )}
              {importErr&&<div style={{fontSize:12,color:C.red,marginTop:8,fontWeight:600}}>❌ {importErr}</div>}
              {importOk&&<div style={{fontSize:13,color:C.green,fontWeight:700,textAlign:"center",padding:10}}>✅ ¡Datos restaurados!</div>}
            </div>

            <div style={{background:"#1a1200",borderRadius:12,padding:12,marginBottom:16,border:"1px solid #4a3a00"}}>
              <div style={{fontSize:12,color:C.amber,fontWeight:700,marginBottom:4}}>💡 Consejo</div>
              <div style={{fontSize:12,color:C.textMuted}}>Hacé un backup cada semana y guardalo en Google Drive o mandátelo por WhatsApp. Así nunca perdés nada.</div>
            </div>

            <button onClick={()=>{setShowBackup(false);setImportErr("");setImportOk(false);}} style={{background:C.cardLight,color:C.textMuted,border:"none",borderRadius:12,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"}}>Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

  </script>

  <!-- Service Worker para offline -->
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        // SW inline como blob
        const swCode = `
          const CACHE = 'paseocan-v1';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).catch(()=>new Response('Offline')))
            );
          });
        `;
        const blob = new Blob([swCode], {type:'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(()=>{});
      });
    }
  </script>
</body>
