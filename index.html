// PaseoCan v4-6 — Cobros navegable

const DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const p2=n=>String(n).padStart(2,"0");
const td=()=>{const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;};
const ds=(y,m,d)=>`${y}-${p2(m+1)}-${p2(d)}`;

const mapsLinkMulti=(pts)=>"https://www.google.com/maps/dir/"+pts.map(p=>encodeURIComponent(p)).join("/");
const mapsRoute=stops=>`https://www.google.com/maps/dir/${stops.filter(Boolean).map(encodeURIComponent).join("/")}/data=!4m2!4m1!3e2`;
const addMin=(t,m)=>{const[h,mm]=t.split(":").map(Number),tot=h*60+mm+m;return`${p2(Math.floor(tot/60)%24)}:${p2(tot%60)}`;};

function wkRange(s){
  const d=new Date(s+"T12:00:00"),dw=d.getDay();
  const mo=new Date(d);mo.setDate(d.getDate()-(dw===0?6:dw-1));
  const su=new Date(mo);su.setDate(mo.getDate()+6);
  const f=x=>`${x.getFullYear()}-${p2(x.getMonth()+1)}-${p2(x.getDate())}`;
  return{from:f(mo),to:f(su)};
}
const addWks=(s,n)=>{const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n*7);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;};
const addMos=(s,n)=>{const[y,m]=s.split("-").map(Number);const d=new Date(y,m-1+n,1);return`${d.getFullYear()}-${p2(d.getMonth()+1)}`;};

const DP=[13000,20000,27000,32000,35000];
const pFor=(f,t)=>(t||DP)[Math.min(Math.max(f,1),5)-1];
const uFor=(f,t)=>Math.round(pFor(f,t)/Math.max(f,1));

// Validadores numericos defensivos
// numInt: entero >= 0, fallback a 0
const numInt=v=>{const n=parseInt(v);return isNaN(n)||n<0?0:n;};
// numPct: 0-100, fallback a 0
const numPct=v=>{const n=parseFloat(v);if(isNaN(n))return 0;return Math.min(Math.max(n,0),100);};
// numPos: numero positivo > 0, fallback a un valor por defecto
const numPos=(v,def)=>{const n=Number(v);return isNaN(n)||n<=0?def:n;};

// ── applyFifoPayment ─────────────────────────────────────────────────────────
// Función pura. Sin mutaciones. Sin UI. Sin localStorage.
// Aplica un pago FIFO sobre deudas ordenadas de más vieja a más nueva.
// Dentro de cada semana, distribuye proporcionalmente entre perros.
//
// Entrada:
//   deudas: [{id, remaining, perros: [{dogId, dogName, debe, ids, adj}]}]
//            ordenadas de más vieja a más nueva (el caller es responsable)
//   monto: number — cuánto se quiere pagar
//
// Salida:
//   { applied, updates, leftover }
//   applied: [{deudaId, dogId, paseoId, amount, beforeRemaining, afterRemaining}]
//   updates: [{paseoId, pa}] — solo pa, el caller deriva paid = (pa >= net)
//   leftover: sobrante si monto > deuda total
// ── Warning Collector global ─────────────────────────────────────────────────
const uid=()=>typeof crypto!=="undefined"&&crypto.randomUUID?crypto.randomUUID():"id-"+Date.now()+"-"+Math.random().toString(36).slice(2);

  if(name==="rutas")return(<svg {...props}><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>);
  if(name==="stats")return(<svg {...props}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>);

  return null;

function pushWarning(type,payload){
  if(typeof window==="undefined")return;
  window.__WARN__=window.__WARN__||[];
  window.__WARN__.unshift({id:uid(),ts:Date.now(),type,...payload});
  window.__WARN__=window.__WARN__.slice(0,200);
}

function applyFifoPayment(deudas, monto){
  if(!deudas||deudas.length===0)return{applied:[],updates:[],leftover:monto};
  if(monto<=0)return{applied:[],updates:[],leftover:0};

  // Assertions internas
  deudas.forEach((d,i)=>{
    if(d.remaining<0)console.warn("applyFifoPayment: remaining negativo en deuda",i,d);
    if(i>0&&d.id<deudas[i-1].id)console.warn("applyFifoPayment: deudas no están ordenadas por fecha");
  });

  const applied=[], updates={};// paseoId → pa acumulado
  let r=monto;

  for(const sem of deudas){
    if(r<=0)break;
    if(sem.remaining<=0)continue;

    const nPerros=sem.perros.filter(p=>p.debe>0).length;
    if(nPerros===0)continue;

    const pagoSem=Math.min(r, sem.remaining);
    let rSem=pagoSem;

    sem.perros.forEach(perro=>{
      if(rSem<=0||perro.debe<=0)return;
      // Distribución proporcional entre perros de la misma semana
      const propMax=nPerros>1?Math.round(pagoSem/nPerros):pagoSem;
      const pagoPerro=Math.min(rSem, propMax, perro.debe);
      if(pagoPerro<=0)return;
      rSem-=pagoPerro;

      // Distribuir pagoPerro en paseos del perro (primer paseo recibe todo)
      let rP=pagoPerro;
      perro.ids.forEach(pid=>{
        if(rP<=0)return;
        const priceAdj=perro.adj.find(a=>String(a.id)===String(pid))?.price||0;
        if(priceAdj<=0)return;
        const ya=updates[pid]?.pa||0;
        const disponible=Math.max(priceAdj-ya,0);
        const ap=Math.min(rP,disponible);
        if(ap<=0)return;
        rP-=ap;
        const beforePa=ya;
        const afterPa=ya+ap;
        updates[pid]={pa:afterPa};
        applied.push({
          deudaId:sem.id,
          dogId:perro.dogId,
          dogName:perro.dogName,
          paseoId:pid,
          amount:ap,
          beforeRemaining:beforePa,
          afterRemaining:afterPa
        });
      });
    });
    r-=pagoSem;
  }

  // Assertion final: no sobrepagar
  const totalApplied=applied.reduce((s,a)=>s+a.amount,0);
  if(totalApplied>monto+0.01)console.warn("applyFifoPayment: totalApplied supera monto",totalApplied,monto);

  return{
    applied,
    updates:Object.entries(updates).map(([paseoId,u])=>({paseoId,pa:u.pa})),
    leftover:Math.max(r,0)
  };
}

// getCxlCompensadosIds: cuando hay cancelados y +Paseos (manual:true) en la misma
// semana, el +Paseo "reemplaza" al cancelado, asi que ese cxl no es perdida real.
// Empareja 1 a 1 en orden cronologico (1er +Paseo compensa al 1er cxl, etc).
// Devuelve Set de IDs de los cancelados que SI estan compensados.
function getCxlCompensadosIds(ps){
  const cxls=ps.filter(p=>p.status==="cancelado").sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const extras=ps.filter(p=>p.manual===true).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const n=Math.min(cxls.length,extras.length);
  const compensados=new Set();
  for(let i=0;i<n;i++)compensados.add(cxls[i].id);
  return compensados;
}

function calcCobro(ps,grp){
  const r=ps.filter(p=>p.status==="completado").length;
  const cc=ps.filter(p=>p.status==="cancelado"&&p.cancelBy==="client").length;
  const cy=ps.filter(p=>p.status==="cancelado"&&p.cancelBy==="me").length;
  if(grp.billingType==="fijo_semanal")return{modo:"fijo_semanal",r,cc,cy,cobro:r>0?grp.fixedAmount||0:0};
  if(grp.unitPrice>0)return{modo:"u",r,cc,cy,precio:grp.unitPrice,cobro:r*grp.unitPrice};
  const pc=(grp.schedule||[]).length,pu=uFor(pc,grp.prices);
  if(r===0)return{modo:"p",r,cc,cy,pc,pa:0,pu,desc:0,prec:0,cobro:0};
  const pa=Math.min(r+cy,5),prec=pFor(pa,grp.prices),desc=cy*pu,cobro=Math.max(prec-desc,0);
  return{modo:"p",r,cc,cy,pc,pa,pu,desc,prec,cobro};
}

// calcDeudaCliente: replica exactamente la lógica de Cobros
// Separa deuda histórica (semanas cerradas) de semana actual (en curso)
// Usa dgid para filtrar correctamente igual que Cobros
function calcDeudaCliente(cd,paseos,T,descuento=0){
  const wkActual=wkRange(T).from;
  let deudaHistorica=0,deudaSemanaActual=0;
  cd.forEach(dog=>(dog.groups||[]).forEach(grp=>{
    const dp=paseos.filter(p=>
      p.dogId===dog.id&&
      (p.dgid===grp.id||(p.gid===grp.id&&!p.dgid))
    );
    if(grp.billingType==="fijo_semanal"){
      // fijo_semanal: el cobro es fixedAmount si hubo al menos 1 realizado
      // ab incluye pa de TODOS los completados (paid:true y paid:false)
      const bw={};
      dp.forEach(p=>{const k=wkRange(p.fecha).from;if(!bw[k])bw[k]=[];bw[k].push(p);});
      Object.entries(bw).forEach(([wkFrom,sp])=>{
        if(!sp.some(p=>p.status==="completado"&&!p.paid))return;
        const r=sp.filter(p=>p.status==="completado").length;
        if(r===0)return;
        const cobroBase=grp.fixedAmount||0;
        const cobro=descuento>0?Math.round(cobroBase*(1-descuento/100)):cobroBase;
        const ab=sp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.pa||0),0);
        const debe=Math.max(cobro-ab,0);
        if(wkFrom===wkActual)deudaSemanaActual+=debe;
        else deudaHistorica+=debe;
      });
    }else if(grp.unitPrice>0){
      dp.filter(p=>p.status==="completado"&&!p.paid).forEach(p=>{
        const debe=p.price-(p.pa||0);
        if(wkRange(p.fecha).from===wkActual)deudaSemanaActual+=debe;
        else deudaHistorica+=debe;
      });
    }else{
      const bw={};
      dp.forEach(p=>{const k=wkRange(p.fecha).from;if(!bw[k])bw[k]=[];bw[k].push(p);});
      Object.entries(bw).forEach(([wkFrom,sp])=>{
        if(!sp.some(p=>p.status==="completado"&&!p.paid))return;
        const c=calcCobro(sp,grp);
        const cobroC=descuento>0?Math.round(c.cobro*(1-descuento/100)):c.cobro;
        // Para pack: ab suma TODOS los completados (el pa puede estar en cualquier paseo)
        const ab=sp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.pa||0),0);
        const debe=Math.max(cobroC-ab,0);
        if(wkFrom===wkActual)deudaSemanaActual+=debe;
        else deudaHistorica+=debe;
      });
    }
  }));
  return{deudaHistorica,deudaSemanaActual,deudaTotal:deudaHistorica+deudaSemanaActual};
}

function migDog(dog){
  if(dog.groups)return dog;
  return{...dog,groups:[{id:"m"+dog.id,gid:"",name:dog.walkTime||"Principal",schedule:dog.schedule||[],prices:dog.prices||[...DP],unitPrice:dog.unitPrice||0}]};
}

// Version actual del schema del backup
const BACKUP_VERSION=3;

// migrate_v1_to_v2: estructura plana del perro -> groups[]
// v1: dog tiene walkTime, schedule, prices, unitPrice planos
// v2: dog tiene groups[{id, gid, name, schedule, prices, unitPrice, billingType}]
// v1 usa clientId/emergencyContact/medication; v2 usa cid/emg/med
function migrate_v1_to_v2(data){
  const dogs=(data.dogs||[]).map(d=>{
    if(d.groups)return d;
    // Renombrar campos
    const cid=d.cid!==undefined?d.cid:d.clientId;
    const emg=d.emg!==undefined?d.emg:d.emergencyContact;
    const med=d.med!==undefined?d.med:d.medication;
    // Construir grupo desde campos planos
    const grp={
      id:"m"+d.id,
      gid:"",
      name:d.walkTime||"Principal",
      schedule:d.schedule||[],
      prices:d.prices||[...DP],
      unitPrice:d.unitPrice||0
    };
    return{id:d.id,cid,name:d.name,color:d.color,breed:d.breed||"",notes:d.notes||"",vet:d.vet||"",med:med||"",emg:emg||"",cancellations:d.cancellations||[],groups:[grp]};
  });
  return{...data,v:2,dogs,gg:data.gg||[],routes:data.routes||[],globalRoute:data.globalRoute||{origin:"",destination:"",minPorKm:15},ajustes:data.ajustes||[]};
}

// migrate_v2_to_v3: IDs numericos -> string
// Toca dogs, clients, paseos, gg, groups dentro de dogs
function migrate_v2_to_v3(data){
  const stringify=v=>v==null?v:String(v);
  const dogs=(data.dogs||[]).map(d=>({
    ...d,
    id:stringify(d.id),
    cid:stringify(d.cid),
    groups:(d.groups||[]).map(g=>({...g,id:stringify(g.id),gid:stringify(g.gid)}))
  }));
  const clients=(data.clients||[]).map(c=>({...c,id:stringify(c.id)}));
  const paseos=(data.paseos||[]).map(p=>({
    ...p,
    id:stringify(p.id),
    dogId:stringify(p.dogId),
    cid:stringify(p.cid),
    gid:stringify(p.gid),
    dgid:p.dgid?stringify(p.dgid):p.dgid
  }));
  const gg=(data.gg||[]).map(g=>({...g,id:stringify(g.id)}));
  return{...data,v:3,dogs,clients,paseos,gg};
}

// migrateBackup: aplica migraciones en cadena segun version
// Tira error si la version es desconocida o mayor a la actual
function migrateBackup(data){
  if(!data||typeof data!=="object")throw new Error("Backup invalido");
  if(!data.dogs||!data.clients||!data.paseos)throw new Error("Backup incompleto");
  let v=data.v||1; // sin v = asumir v1
  let result=data;
  if(v>BACKUP_VERSION)throw new Error("Backup de version "+v+" mas nueva que la app (v"+BACKUP_VERSION+"). Actualiza la app.");
  if(v===1){result=migrate_v1_to_v2(result);v=2;}
  if(v===2){result=migrate_v2_to_v3(result);v=3;}
  return result;
}

// migrateIdsInPlace: detecta si hay IDs numericos en localStorage y los migra a string
// Devuelve {needed: true/false, dogs, clients, paseos, gg} con los datos migrados
// Es idempotente: si ya estan todos como string, devuelve needed=false
function migrateIdsInPlace(dogs,clients,paseos,gg){
  const stringify=v=>v==null?v:String(v);
  // Detectar si hay alguno numerico
  const hasNumDog=(dogs||[]).some(d=>typeof d.id==="number");
  const hasNumCl=(clients||[]).some(c=>typeof c.id==="number");
  const hasNumP=(paseos||[]).some(p=>typeof p.id==="number"||typeof p.dogId==="number");
  const hasNumGg=(gg||[]).some(g=>typeof g.id==="number");
  if(!hasNumDog&&!hasNumCl&&!hasNumP&&!hasNumGg)return{needed:false};
  // Validacion previa: cada paseo debe referir a un dog y client que existen
  const dogIds=new Set((dogs||[]).map(d=>stringify(d.id)));
  const clIds=new Set((clients||[]).map(c=>stringify(c.id)));
  for(const p of (paseos||[])){
    if(!dogIds.has(stringify(p.dogId))){
      throw new Error("MIGRACION_ABORTADA: paseo "+p.id+" referencia dogId "+p.dogId+" que no existe");
    }
    if(p.cid!=null&&!clIds.has(stringify(p.cid))){
      throw new Error("MIGRACION_ABORTADA: paseo "+p.id+" referencia cid "+p.cid+" que no existe");
    }
  }
  // Aplicar conversion
  const newDogs=(dogs||[]).map(d=>({
    ...d,
    id:stringify(d.id),
    cid:stringify(d.cid),
    groups:(d.groups||[]).map(g=>({...g,id:stringify(g.id),gid:stringify(g.gid)}))
  }));
  const newClients=(clients||[]).map(c=>({...c,id:stringify(c.id)}));
  const newPaseos=(paseos||[]).map(p=>({
    ...p,
    id:stringify(p.id),
    dogId:stringify(p.dogId),
    cid:p.cid!=null?stringify(p.cid):p.cid,
    gid:p.gid!=null?stringify(p.gid):p.gid,
    dgid:p.dgid!=null?stringify(p.dgid):p.dgid
  }));
  const newGg=(gg||[]).map(g=>({...g,id:stringify(g.id)}));
  return{needed:true,dogs:newDogs,clients:newClients,paseos:newPaseos,gg:newGg};
}

function makePaseos(dog,grp,existing){
  const T=td(),seen=new Set(existing.filter(p=>p.dogId===dog.id&&(p.dgid===grp.id||(p.gid===grp.id&&!p.dgid))).map(p=>`${dog.id}${grp.id}${p.fecha}`));
  const base=new Date(T+"T12:00:00"),days=grp.schedule.map(Number),price=grp.billingType==="fijo_semanal"?0:(grp.unitPrice||pFor(days.length,grp.prices)),out=[];
  for(let i=0;i<49;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);
    const dw=d.getDay();if(!days.includes(dw))continue;
    const fecha=ds(d.getFullYear(),d.getMonth(),d.getDate()),key=`${dog.id}${grp.id}${fecha}`;
    if(seen.has(key))continue;seen.add(key);
    out.push({id:uid(),dogId:dog.id,cid:dog.cid,gid:grp.gid||grp.id,dgid:grp.id,fecha,status:"programado",cancelBy:null,paid:false,pa:0,price,manual:false});
  }
  return out;
}

function initPaseos(dogs){
  const T=td(),seen=new Set(),all=[];
  dogs.forEach(rawDog=>{
    const dog=migDog(rawDog);
    (dog.groups||[]).forEach(grp=>{
      const base=new Date(T+"T12:00:00"),days=grp.schedule.map(Number),price=grp.billingType==="fijo_semanal"?0:(grp.unitPrice||pFor(days.length,grp.prices));
      for(let i=0;i<49;i++){
        const d=new Date(base);d.setDate(base.getDate()+i);
        const dw=d.getDay();if(!days.includes(dw))continue;
        const fecha=ds(d.getFullYear(),d.getMonth(),d.getDate()),key=`${dog.id}${grp.id}${fecha}`;
        if(seen.has(key))continue;seen.add(key);
        all.push({id:uid(),dogId:dog.id,cid:dog.cid,gid:grp.gid||grp.id,dgid:grp.id,fecha,status:"programado",cancelBy:null,paid:false,pa:0,price,manual:false});
      }
    });
  });
  return all;
}

function loadLS(k,fb){try{const r=localStorage.getItem(k);if(!r||r==="null")return typeof fb==="function"?fb():fb;const p=JSON.parse(r);return p==null?typeof fb==="function"?fb():fb:p;}catch{return typeof fb==="function"?fb():fb;}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function usePersist(k,fb){
  const[s,ss]=useState(()=>loadLS(k,fb));
  const set=useCallback(v=>{ss(p=>{const n=typeof v==="function"?v(p):v;saveLS(k,n);return n;});},[k]);
  return[s,set];
}

function Agenda({paseos,setPaseos,dogs,setDogs,clients,gg,onAdd,onGoCobros,mDogs,routes,onOpenRuta}){
  const T=td();

  const[calExp,setCalExp]=useState(false);

  const finanzasResumen=useMemo(()=>{
    const wk=wkRange(T);
    const result=buildClientFinancials(clients,mDogs,paseos,wk);
    // Deuda VENCIDA = solo de semanas anteriores (totalHistorico)
    // No incluye paseos hechos esta semana sin pagar (flujo normal, no vencido)
    const conDeuda=result.filter(c=>(c.totalHistorico||0)>0);
    const totalDeuda=conDeuda.reduce((s,c)=>s+(c.totalHistorico||0),0);
    return{cantidad:conDeuda.length,total:totalDeuda};
  },[clients,mDogs,paseos,T]);
  const proximoPaseo=useMemo(()=>{
    const futuros=paseos.filter(p=>p.fecha>=T&&p.status==="programado").sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(futuros.length===0)return null;
    const fecha=futuros[0].fecha;
    const grupoP=futuros.filter(p=>p.fecha===fecha);
    const gid=grupoP[0].gid;
    const grpInfo=gg.find(g=>g.id===gid);
    const cant=grupoP.filter(p=>p.gid===gid&&p.status!=="cancelado").length;

      {cxlM&&(()=>{

        const cxlGrp=cxlDog?.groups?.find(g=>g.id===cxlPaseo?.dgid||(g.gid===cxlPaseo?.gid&&!cxlPaseo?.dgid));
        const esPack=cxlGrp&&!cxlGrp.unitPrice;

        const rActual=wpActual.filter(p=>p.status==="completado").length;

        // Simular con cancelación del cliente
        const simCli=esPack?calcCobro([...wpActual],cxlGrp):null;

        // Para el modo Mover: fechas validas (futuras de hoy y dentro de la semana del paseo)

                    <div>{"Cancele yo"}</div>

function CobrosFicha({data,paseos,setPaseos,wk,ajustes,adjTotal,onVolver,onPay,onDeuda,onAdelantado,showHistorial,setShowHistorial,routes,gg,mDogs}){
  const{cl,items,base,ids,adj,wIds,wAdj,historialOrdenado,totalHistorico}=data;
  const wBase=items.reduce((s,x)=>s+x.wCharge,0);
  const fin=adjTotal(cl.id,wBase),dif=fin-wBase;
  const descuento=cl.descuento||0;
  const cobroBrutoItem=(x)=>{
    if(x.grp.billingType==="fijo_semanal"&&x.grp.billingTiming==="adelantado"&&x.unpW.length===0){
      const wp=paseos.filter(p=>p.dogId===x.dog.id&&(p.dgid===x.grp.id||(p.gid===x.grp.id&&!p.dgid))&&p.fecha>=wk.from&&p.fecha<=wk.to);
      if(wp.some(p=>p.status==="programado"))return x.grp.fixedAmount||0;
    }
    return x.calc.cobro||0;
  };
  const cobroDescItem=(x)=>{const cb=cobroBrutoItem(x);return descuento>0?Math.round(cb*(1-descuento/100)):cb;};
  const subtotalBruto=items.reduce((s,x)=>s+cobroBrutoItem(x),0);
  const totalConDesc=items.reduce((s,x)=>s+cobroDescItem(x),0);
  const montoDescuento=subtotalBruto-totalConDesc;
  const abonadoSemana=Math.max(totalConDesc-wBase,0);
  const byDog={};items.forEach(s=>{if(!byDog[s.dog.id])byDog[s.dog.id]={dog:s.dog,grps:[]};byDog[s.dog.id].grps.push(s);});
  const dogStats=Object.values(byDog).map(({dog,grps})=>{
    const totDesc=grps.reduce((s,x)=>s+cobroDescItem(x),0);
    const wChg=grps.reduce((s,x)=>s+x.wCharge,0);
    const abDog=Math.max(totDesc-wChg,0);
    return{dog,grps,totDesc,wChg,abDog};
  });
  const totalDeuda=fin+totalHistorico;
  const tieneDeudaSem=fin>0;
  const tieneDeudaAnt=totalHistorico>0;
  const tieneDeuda=totalDeuda>0;
  const masDeUnPerro=Object.keys(byDog).length>1;
  const detalleLinea=(calc,grp)=>{
    if(calc.modo==="u")return calc.r+" paseo"+(calc.r!==1?"s":"")+" · "+$(calc.precio)+" c/u";
    if(calc.modo==="fijo_semanal")return "Tarifa fija "+(grp.billingTiming==="adelantado"?"adelantado":"vencido")+" · "+calc.r+" paseo"+(calc.r!==1?"s":"");
    return calc.pc+" dias/sem"+(calc.cy>0?" + "+calc.cy+" cancel. mias":"")+" = "+calc.pa+" paseos";
  };
  return(
    <div>
      <button onClick={onVolver} style={{...Btn("transparent",C.grn),padding:"0 0 14px",fontSize:14,fontWeight:600}}>{"< Cobros"}</button>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:24,fontWeight:800,color:C.txt,marginBottom:4}}>{cl.name}</div>
        <div style={{fontSize:13,color:C.mut,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span>{Object.values(byDog).map(x=>x.dog.name).join(", ")}</span>
          {descuento>0&&<span style={{fontSize:11,background:C.grn+"22",color:C.grn,padding:"1px 6px",borderRadius:8,fontWeight:700}}>{"-"+descuento+"%"}</span>}
        </div>
      </div>
      <div style={{fontSize:11,color:C.mut,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>
        {masDeUnPerro?"Desglose por perro":"Detalle de la semana"}
      </div>
      {masDeUnPerro&&abonadoSemana>0&&(
        <div style={{fontSize:11,color:C.mut,marginBottom:8,padding:"8px 12px",background:C.cl,borderRadius:8,fontStyle:"italic"}}>
          {"Los pagos se distribuyen proporcional entre los perros"}
        </div>
      )}
      {dogStats.map(({dog,grps,totDesc,wChg,abDog})=>(

// Suma legMins activos mapeando indices: cancelados intermedios se acreditan al siguiente activo
function sumLegMinsForActive(legMins,ordered,orderedActive,activeIdx){
  if(!legMins||legMins.length===0)return 0;
  let fromIdx,toIdx;
  if(activeIdx>=orderedActive.length){
    const lastA=orderedActive[orderedActive.length-1];
    fromIdx=lastA?ordered.indexOf(lastA)+1:0;
    toIdx=ordered.length+1;
  }else{
    const origCurr=ordered.indexOf(orderedActive[activeIdx]);
    const origPrev=activeIdx===0?-1:ordered.indexOf(orderedActive[activeIdx-1]);
    fromIdx=origPrev+1;
    toIdx=origCurr+1;
  }
  return legMins.slice(fromIdx,toIdx).reduce((a,b)=>a+(b||0),0);
}

function calcDogMetricsForRoute(route,dog,gg,mDogs,paseos,fecha){
  if(!route||!route.legMins||route.legMins.length===0)return null;
  const toMins=t=>{const[h,m]=t.split(":").map(Number);return h*60+m;};
  const grpObj=gg.find(g=>g.id===route.gid);
  const mPK=grpObj?.minPorKm||15;
  const dow=new Date(fecha+"T12:00:00").getDay();
  const gid=route.gid;
  // Replicar dogsOnDG
  const porConfig=mDogs.filter(d=>(d.groups||[]).some(g=>g.gid===gid&&g.schedule.includes(Number(dow))));
  const fechasDow=paseos.filter(p=>p.gid===gid&&p.manual&&p.fecha===fecha).map(p=>p.dogId);
  const porManual=mDogs.filter(d=>fechasDow.includes(d.id)&&!porConfig.some(x=>x.id===d.id));
  const allStops=[...porConfig,...porManual];
  // Si el perro no esta en allStops, no hubo paseo ese dia
  if(!allStops.some(d=>d.id===dog.id))return null;
  // ordered = stopOrder + perros faltantes
  const ordered=route.stopOrder?.length?[...route.stopOrder.map(id=>allStops.find(d=>d.id===id)).filter(Boolean),...allStops.filter(d=>!route.stopOrder.includes(d.id))]:allStops;
  // cancelados ese dia
  const cxlIds=paseos.filter(p=>p.fecha===fecha&&p.status==="cancelado"&&(p.gid===gid||p.dgid===gid)).map(p=>p.dogId);
  const orderedActive=ordered.filter(d=>!cxlIds.includes(d.id));
  // Si el perro esta cancelado, no calcular
  if(cxlIds.includes(dog.id))return null;
  // arrivals
  let cur=route.startTime||"08:00";
  const arr=[];
  orderedActive.forEach((_,i)=>{cur=addMin(cur,sumLegMinsForActive(route.legMins||[],ordered,orderedActive,i));arr.push(cur);});
  arr.push(addMin(cur,sumLegMinsForActive(route.legMins||[],ordered,orderedActive,orderedActive.length)));
  // plazaDeparture
  const stay=route.stayMins??60;
  let plazaArr=route.startTime||"08:00";
  orderedActive.forEach((_,i)=>{plazaArr=addMin(plazaArr,sumLegMinsForActive(route.legMins||[],ordered,orderedActive,i));});
  plazaArr=addMin(plazaArr,sumLegMinsForActive(route.legMins||[],ordered,orderedActive,orderedActive.length));
  const dep=addMin(plazaArr,stay);
  // returnBase = returnOrder + faltantes (de allStops)
  const returnBase=route.returnOrder?.length?[...route.returnOrder.map(id=>allStops.find(d=>d.id===id)).filter(Boolean),...allStops.filter(d=>!route.returnOrder.includes(d.id))]:[...orderedActive];
  const returnActive=returnBase.filter(d=>!cxlIds.includes(d.id));
  // arrivalsReturn
  let curR=dep;
  const arrR=[];
  returnActive.forEach((_,i)=>{curR=addMin(curR,sumLegMinsForActive(route.returnMins||[],returnBase,returnActive,i));arrR.push(curR);});
  arrR.push(addMin(curR,sumLegMinsForActive(route.returnMins||[],returnBase,returnActive,returnActive.length)));
  // Buscar el perro
  const idaIdx=orderedActive.findIndex(d=>d.id===dog.id);
  const riActivo=returnActive.findIndex(d=>d.id===dog.id);
  if(idaIdx<0||riActivo<0)return null;
  const horaRecogida=arr[idaIdx];
  const horaDevolucion=arrR[riActivo];
  if(!horaRecogida||!horaDevolucion)return null;
  const minsFuera=toMins(horaDevolucion)-toMins(horaRecogida);
  const minsMov=Math.max(minsFuera-stay,0);
  const km=Math.round((minsMov/mPK)*10)/10;
  return{minsFuera,minsMov,canilMin:stay,km};
}

// Captura snapshot de metricas del paseo al momento de completarlo.
// Guarda datos del perro Y del paseador para que Stats sea historico fiel
// incluso si despues se cambia la configuracion de la ruta.
function buildPaseoSnapshot(paseo,dog,routes,mDogs,gg,paseos){
  const dow=new Date(paseo.fecha+"T12:00:00").getDay();
  const route=routes.find(r=>r.key===dow+"_"+paseo.gid);
  if(!route)return null;
  const m=calcDogMetricsForRoute({...route,gid:paseo.gid},dog,gg,mDogs,paseos,paseo.fecha);
  if(!m)return null;
  const grpObj=gg.find(g=>g.id===paseo.gid);
  const mPK=grpObj?.minPorKm||15;
  const stay=route.stayMins??60;
  const legMinsSum=(route.legMins||[]).reduce((s,x)=>s+(x||0),0);
  const returnMinsSum=(route.returnMins||[]).reduce((s,x)=>s+(x||0),0);
  return{...m,legMinsSum,returnMinsSum,stayMins:stay,minPorKm:mPK};
}

function buildReporteSemanal(cl,mDogs,paseos,wk,routes,gg){
  const cd=mDogs.filter(d=>d.cid===cl.id);
  const wkLabel=wk.from.slice(8,10)+"/"+wk.from.slice(5,7)+" al "+wk.to.slice(8,10)+"/"+wk.to.slice(5,7);
  const DIAS=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
  let texto="🐕 Resumen semanal — "+cl.name+"\n";
  texto+="Semana del "+wkLabel+"\n\n";
  cd.forEach(dog=>{
    if(cd.length>1)texto+="── "+dog.name+" ──\n";
    const wp=paseos.filter(p=>p.dogId===dog.id&&p.fecha>=wk.from&&p.fecha<=wk.to);
    const completados=wp.filter(p=>p.status==="completado");
    // Compensados: cxl con +Paseo en la misma semana (no son perdida real, no los reportamos)
    const compensadosIds=new Set();
    (dog.groups||[]).forEach(grp=>{
      const psGrp=wp.filter(p=>(p.dgid===grp.id||(p.gid===grp.id&&!p.dgid)));
      const comp=getCxlCompensadosIds(psGrp);
      comp.forEach(id=>compensadosIds.add(id));
    });
    const cxlClient=wp.filter(p=>p.status==="cancelado"&&p.cancelBy==="client"&&!compensadosIds.has(p.id));
    const cxlMe=wp.filter(p=>p.status==="cancelado"&&p.cancelBy==="me"&&!compensadosIds.has(p.id));
    const diasComp=completados.map(p=>DIAS[new Date(p.fecha+"T12:00:00").getDay()]).join(", ");
    texto+="✅ Paseos: "+completados.length+(diasComp?" ("+diasComp+")":"")+"\n";
    if(cxlClient.length>0)texto+="❌ Cancelaciones: "+cxlClient.length+" (por el cliente)\n";
    if(cxlMe.length>0)texto+="⚠️ Cancelaciones mias: "+cxlMe.length+"\n";
    let totalMin=0,canilMin=0,movMin=0,kmTotal=0,diasConDatos=0;
    completados.forEach(p=>{
      let m=p.metrics||null;
      if(!m){
        const dow=new Date(p.fecha+"T12:00:00").getDay();
        const route=routes.find(r=>r.key===dow+"_"+p.gid);
        if(!route)return;
        m=calcDogMetricsForRoute({...route,gid:p.gid},dog,gg,mDogs,paseos,p.fecha);
      }
      if(!m)return;
      diasConDatos++;
      totalMin+=m.minsFuera;
      movMin+=m.minsMov;
      canilMin+=m.canilMin;
      kmTotal+=m.km;
    });
    kmTotal=Math.round(kmTotal*10)/10;
    if(diasConDatos>0){
      const formatTime=m=>{const h=Math.floor(m/60),mm=m%60;return h>0?h+"h "+mm+"min":mm+"min";};
      texto+="⏱️ Tiempo total: "+formatTime(totalMin)+"\n";
      texto+="🏃 Tiempo en movimiento: "+formatTime(movMin)+"\n";
      texto+="🌳 Tiempo en canil: "+formatTime(canilMin)+"\n";
      texto+="🚶 Distancia caminada: "+kmTotal.toFixed(1)+" km\n";
    }
    texto+="\n";
  });
  const fin=buildClientFinancials([cl],mDogs,paseos,wk);
  if(fin.length>0){
    const data=fin[0];
    const wCharge=data.items.reduce((s,x)=>s+x.wCharge,0);
    const deudaAnt=data.totalHistorico||0;
    const desc=cl.descuento||0;
    // Cobrado esta semana = pa>0 de paseos de la semana
    const cobradoSem=paseos.filter(p=>data.items.some(it=>it.dog.id===p.dogId)&&p.fecha>=wk.from&&p.fecha<=wk.to&&(p.pa||0)>0).reduce((s,p)=>s+(p.pa||0),0);
    const totalSemana=wCharge+cobradoSem;
    if(totalSemana>0){
      texto+="💰 Total semana: $"+totalSemana.toLocaleString("es-AR");
      if(desc>0)texto+=" ("+desc+"% desc)";
      texto+="\n";
      if(cobradoSem>0)texto+="💵 Cobrado: $"+cobradoSem.toLocaleString("es-AR")+"\n";
    }
    if(deudaAnt>0)texto+="⚠️ Deuda anterior: $"+deudaAnt.toLocaleString("es-AR")+"\n";
    const totalPendiente=wCharge+deudaAnt;
    if(totalPendiente>0)texto+="📌 Pendiente: $"+totalPendiente.toLocaleString("es-AR")+"\n";
    else texto+="✓ Al dia\n";
  }
  const proxFecha=new Date(wk.to+"T12:00:00");
  proxFecha.setDate(proxFecha.getDate()+1);
  const proxFin=new Date(proxFecha);
  proxFin.setDate(proxFin.getDate()+6);
  const f=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;
  const proxPaseos=paseos.filter(p=>cd.some(d=>d.id===p.dogId)&&p.fecha>=f(proxFecha)&&p.fecha<=f(proxFin)&&p.status==="programado").sort((a,b)=>a.fecha.localeCompare(b.fecha));
  if(proxPaseos.length>0){
    texto+="\n📅 Proximos paseos:\n";
    const yaPuestos=new Set();
    proxPaseos.forEach(p=>{
      if(yaPuestos.has(p.fecha))return;
      yaPuestos.add(p.fecha);
      const d=new Date(p.fecha+"T12:00:00");
      const dia=DIAS[d.getDay()];
      texto+=dia+" "+p.fecha.slice(8,10)+"/"+p.fecha.slice(5,7)+"\n";
    });
  }
  texto+="\nGracias!";
  return texto;
}

// calcOldDebt: deuda historica de un perro/grupo (paseos fuera de la semana actual)
// Para unitPrice: suma price - pa de cada paseo completado sin pagar
// Para pack/fijo: agrupa por semana, calcula cobro de cada semana, resta abonado
function calcOldDebt(grp,all,wk,descCli=0){
  if(grp.unitPrice>0){
    const unpO=all.filter(p=>p.status==="completado"&&!p.paid&&(p.fecha<wk.from||p.fecha>wk.to));
    return unpO.reduce((s,p)=>s+(p.price-(p.pa||0)),0);
  }
  let oldDebt=0;
  const bw={};
  all.filter(p=>p.fecha<wk.from||p.fecha>wk.to).forEach(p=>{
    const k=wkRange(p.fecha).from;
    if(!bw[k])bw[k]=[];
    bw[k].push(p);
  });
  Object.values(bw).forEach(sp=>{
    if(!sp.some(p=>p.status==="completado"&&!p.paid))return;
    const c=calcCobro(sp,grp);
    const cobroConDesc=descCli>0?Math.round(c.cobro*(1-descCli/100)):c.cobro;
    // Para pack y fijo_semanal: ab suma TODOS los completados (el pa puede estar en cualquier paseo)
    const ab=sp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.pa||0),0);
    oldDebt+=Math.max(cobroConDesc-ab,0);
  });
  return oldDebt;
}

// calcWCharge: lo que se cobra esta semana
// - Si hay completados sin pagar: cobro con descuento menos abonado
// - Si fijo_semanal adelantado sin completados: cobro al inicio si hay programados
// - Si nada de lo anterior: 0
function calcWCharge(grp,calc,abW,unpW,descCli,wp){
  const cobroConDesc=descCli>0?Math.round(calc.cobro*(1-descCli/100)):calc.cobro;
  const wChargeRaw=unpW.length>0?Math.max(cobroConDesc-abW,0):0;
  if(grp.billingType==="fijo_semanal"&&grp.billingTiming==="adelantado"&&unpW.length===0){
    const hayProgramados=wp.some(p=>p.status==="programado");
    const yaAbonado=wp.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.pa||0),0);
    if(hayProgramados&&yaAbonado<(grp.fixedAmount||0)){
      return Math.max((grp.fixedAmount||0)-yaAbonado,0);
    }
  }
  return wChargeRaw;
}

function buildClientFinancials(clients,mDogs,paseos,wk){
  const summary=clients.flatMap(cl=>{
    return mDogs.filter(d=>d.cid===cl.id).flatMap(dog=>(dog.groups||[]).map(grp=>{
      const all=paseos.filter(p=>p.dogId===dog.id&&(p.dgid===grp.id||(p.gid===grp.id&&!p.dgid)));
      const wp=all.filter(p=>p.fecha>=wk.from&&p.fecha<=wk.to);
      const calc=calcCobro(wp,grp);
      const unpW=wp.filter(p=>p.status==="completado"&&!p.paid);
      const unpO=all.filter(p=>p.status==="completado"&&!p.paid&&(p.fecha<wk.from||p.fecha>wk.to));
      const allCompW=wp.filter(p=>p.status==="completado");
      const abW=allCompW.reduce((s,p)=>s+(p.pa||0),0);
      const descCli=cl.descuento||0;
      const oldDebt=calcOldDebt(grp,all,wk,descCli);
      const wCharge=calcWCharge(grp,calc,abW,unpW,descCli,wp);
      return{cl,dog,grp,calc,unpW,unpO,wCharge,oldDebt};
    }));
  }).filter(x=>x.grp.schedule.length>0);
  const m={};
  summary.forEach(s=>{
    if(!m[s.cl.id])m[s.cl.id]={cl:s.cl,items:[],base:0,ids:[],adj:[],wIds:[],wAdj:[],historial:{}};
    m[s.cl.id].items.push(s);m[s.cl.id].base+=s.wCharge+s.oldDebt;
    m[s.cl.id].wIds.push(...s.unpW.map(p=>p.id));
    const descCliW=s.cl.descuento||0;
    const cobroWconDesc=descCliW>0?Math.round(s.calc.cobro*(1-descCliW/100)):s.calc.cobro;
    const precioWconDesc=descCliW>0?Math.round((s.calc.precio||0)*(1-descCliW/100)):(s.calc.precio||0);
    if(s.calc.modo==="p"&&s.unpW.length>0)s.unpW.forEach((p,i)=>m[s.cl.id].wAdj.push({id:p.id,price:i===0?cobroWconDesc:0}));
    else if(s.calc.modo==="fijo_semanal"&&s.unpW.length>0)s.unpW.forEach((p,i)=>m[s.cl.id].wAdj.push({id:p.id,price:i===0?cobroWconDesc:0}));
    else m[s.cl.id].wAdj.push(...s.unpW.map(p=>({id:p.id,price:precioWconDesc})));
    m[s.cl.id].ids.push(...s.unpW.map(p=>p.id),...s.unpO.map(p=>p.id));
    if((s.calc.modo==="p"||s.calc.modo==="fijo_semanal")&&s.unpW.length>0)s.unpW.forEach((p,i)=>m[s.cl.id].adj.push({id:p.id,price:i===0?cobroWconDesc:0}));
    else m[s.cl.id].adj.push(...s.unpW.map(p=>({id:p.id,price:precioWconDesc})));
    const descCliHist=s.cl.descuento||0;
    const allHist=paseos.filter(p=>p.dogId===s.dog.id&&(p.dgid===s.grp.id||(p.gid===s.grp.id&&!p.dgid))&&(p.fecha<wk.from||p.fecha>wk.to));
    const bw={};allHist.forEach(p=>{const k=wkRange(p.fecha).from;if(!bw[k])bw[k]=[];bw[k].push(p);});
    Object.entries(bw).forEach(([wkFrom,sp])=>{
      if(!sp.some(p=>p.status==="completado"&&!p.paid))return;
      const c=calcCobro(sp,s.grp);
      const cobroConDesc=descCliHist>0?Math.round(c.cobro*(1-descCliHist/100)):c.cobro;
      const esPorPaseo=s.grp.unitPrice>0;
      let debe,adjHist;
      if(esPorPaseo){
        // por_paseo: cada paseo tiene su propio price; debe = suma de (price - pa) de no pagados
        const sinPagar=sp.filter(p=>p.status==="completado"&&!p.paid);
        debe=sinPagar.reduce((acc,p)=>acc+Math.max((p.price||0)-(p.pa||0),0),0);
        adjHist=sinPagar.map(p=>({id:p.id,price:p.price||0}));
      }else{
        // fijo_semanal / pack: cobro como total agregado; ab suma TODOS los completados
        // (el pa puede estar en cualquier paseo de la semana, no solo los no pagados)
        const ab=sp.filter(p=>p.status==="completado").reduce((acc,p)=>acc+(p.pa||0),0);
        debe=Math.max(cobroConDesc-ab,0);
        adjHist=[];sp.filter(p=>p.status==="completado"&&!p.paid).forEach((p,i)=>adjHist.push({id:p.id,price:i===0?Math.max(cobroConDesc-ab,0):0}));
      }
      if(debe<=0)return;
      if(!m[s.cl.id].historial[wkFrom])m[s.cl.id].historial[wkFrom]={wkFrom,perros:[],total:0};
      m[s.cl.id].historial[wkFrom].perros.push({dogId:s.dog.id,dogName:s.dog.name,color:s.dog.color,debe,ids:sp.filter(p=>p.status==="completado"&&!p.paid).map(p=>p.id),adj:adjHist});
      m[s.cl.id].historial[wkFrom].total+=debe;
      adjHist.forEach(a=>m[s.cl.id].adj.push({id:a.id,price:a.price}));
    });
  });
  Object.values(m).forEach(c=>{
    c.historialOrdenado=Object.values(c.historial).sort((a,b)=>a.wkFrom.localeCompare(b.wkFrom));
    c.totalHistorico=c.historialOrdenado.reduce((s,h)=>s+h.total,0);
  });
  return Object.values(m);
}

function Cobros({paseos,setPaseos,dogs,clients,gg,clienteFoco,onVolverClientes,routes,mDogs}){
  const T=td();
  const[confPay,setConfPay]=useState(null);
  const[confDeuda,setConfDeuda]=useState(null);
  const[confAdelantado,setConfAdelantado]=useState(null);
  const[showHistorial,setShowHistorial]=useState({});
  const[expandido,setExpandido]=useState(clienteFoco||null);
  const[filtroC,setFiltroC]=useState("todos");
  useEffect(()=>{if(clienteFoco)setExpandido(clienteFoco);},[clienteFoco]);
  const[ajustes,setAjustes]=usePersist("pc_ajustes",{});
  const wk=wkRange(T);
  const adjTotal=(cid,base)=>{const a=ajustes[cid];if(!a||!a.val)return base;return a.type==="pct"?Math.round(base*(1-a.val/100)):base+a.val;};
  const byClient=useMemo(()=>{
    const result=buildClientFinancials(clients,mDogs,paseos,wk);
    // Drift assertion: comparar con calcDeudaCliente
    result.forEach(c=>{
      const summaryTotal=c.items.reduce((s,x)=>s+x.wCharge+x.oldDebt,0);
      const cd=c.items.map(x=>x.dog);
      const calcResult=calcDeudaCliente(cd,paseos,wk.from,c.cl.descuento||0);
      const calcTotal=calcResult.deudaTotal;
      if(Math.abs(summaryTotal-calcTotal)>0.01){
        pushWarning("DEUDA_DRIFT",{
          cliente:c.cl.name,
          summary:summaryTotal,
          calc:calcTotal,
          delta:summaryTotal-calcTotal,
          historialLen:c.historialOrdenado.length,
          modelos:c.items.map(x=>x.grp.billingType||"pack_dinamico"),
        });
      }
    });
    return result;
  },[clients,mDogs,paseos,wk]);
  const summary=useMemo(()=>byClient.flatMap(c=>c.items),[byClient]);
  const doPartialDeuda=({historialOrdenado,cid,parcial})=>{
    // Construir deudas en formato applyFifoPayment
    const deudas=(historialOrdenado||[]).map(sem=>({
      id:sem.wkFrom,
      remaining:sem.total,
      perros:sem.perros
    }));
    const result=applyFifoPayment(deudas,parcial);
    if(result.leftover>0)console.warn("doPartialDeuda: leftover",result.leftover);
    // Aplicar updates SUMANDO al pa actual (applyFifoPayment calcula delta desde 0)
    // Comparaciones tolerantes a tipo: IDs pueden ser string o number (compatibilidad data legacy)
    setPaseos(ps=>ps.map(p=>{
      const u=result.updates.find(x=>String(x.paseoId)===String(p.id));
      if(!u)return p;
      const adjPrice=historialOrdenado
        .flatMap(s=>s.perros)
        .flatMap(pr=>pr.adj)
        .find(a=>String(a.id)===String(p.id))?.price||0;
      const newPa=(p.pa||0)+u.pa;
      const paid=adjPrice>0&&newPa>=adjPrice;
      return{...p,pa:newPa,paid};
    }));
    setAjustes(a=>({...a,[cid]:undefined}));setConfDeuda(null);
  };
  const doAdelantado=({ids,cid,monto,montoBase})=>{
    // monto = lo que paga ahora
    // montoBase = cobro total con descuento (si lo hay)
    const wkFrom=wkRange(T).from, wkTo=wkRange(T).to;
    setPaseos(ps=>{
      const dogIds=mDogs.filter(d=>d.cid===cid).map(d=>d.id);
      if(!dogIds.length)return ps;
      const primerPorPerro={};
      ps.filter(p=>
        dogIds.includes(p.dogId)&&
        p.fecha>=wkFrom&&p.fecha<=wkTo&&
        (p.status==="completado"||p.status==="programado")
      ).sort((a,b)=>a.fecha.localeCompare(b.fecha))
      .forEach(p=>{if(!primerPorPerro[p.dogId])primerPorPerro[p.dogId]=p.id;});
      const targets=Object.values(primerPorPerro);
      if(!targets.length)return ps;
      const porPerro=Math.round(monto/targets.length);
      const updates={};
      targets.forEach((pid,i)=>{
        updates[pid]=i<targets.length-1?porPerro:monto-(porPerro*(targets.length-1));
      });
      // Si hay montoBase (cobro con descuento), guardarlo como price en los paseos
      // para que abW/wCharge lo tomen en cuenta correctamente
      const porPerroBase=montoBase?Math.round(montoBase/targets.length):null;
      return ps.map(p=>{
        if(!updates[p.id])return p;
        const newPrice=porPerroBase||p.price;
        return{...p,pa:(p.pa||0)+updates[p.id],paid:false,price:newPrice};
      });
    });
    // Mantener ajuste activo para wCharge
    setConfPay(null);
  };
  const totCob=paseos.filter(p=>p.fecha>=wk.from&&p.fecha<=wk.to&&(p.status==="completado"||(p.status==="programado"&&(p.pa||0)>0))).reduce((s,p)=>s+(p.pa||0),0);
  // totPend = lo que queda por cobrar de la semana actual
  // = Potencial sin cxl - Cobrado - Cancelaciones
  // - Lo que SE podria haber cobrado, menos lo ya entrado, menos lo perdido por cxl
  // - NO incluye deuda anterior
  const totPend=useMemo(()=>{
    let pot=0,real=0,cobrado=0;
    mDogs.forEach(dog=>(dog.groups||[]).forEach(grp=>{
      if(!grp.schedule.length)return;
      const cl=clients.find(c=>c.id===dog.cid);
      const descCli=cl?.descuento||0;
      const wp=paseos.filter(p=>p.dogId===dog.id&&(p.dgid===grp.id||(p.gid===grp.id&&!p.dgid))&&p.fecha>=wk.from&&p.fecha<=wk.to);
      if(!wp.length)return;
      // Sin cancelados (potencial maximo)
      const wpSinCxl=wp.map(p=>(p.status==="programado"||p.status==="cancelado")?{...p,status:"completado"}:p);
      const cSin=calcCobro(wpSinCxl,grp);
      pot+=descCli>0?Math.round(cSin.cobro*(1-descCli/100)):cSin.cobro;
      // Con cancelados (potencial real, lo que vas a facturar)
      const wpReal=wp.map(p=>p.status==="programado"?{...p,status:"completado"}:p);
      const cReal=calcCobro(wpReal,grp);
      real+=descCli>0?Math.round(cReal.cobro*(1-descCli/100)):cReal.cobro;
      // Cobrado: suma de pa de los paseos de la semana
      cobrado+=wp.filter(p=>p.status==="completado"||(p.status==="programado"&&(p.pa||0)>0)).reduce((s,p)=>s+(p.pa||0),0);
    }));
    const perdida=Math.max(pot-real,0);
    return Math.max(pot-cobrado-perdida,0);
  },[paseos,mDogs,clients,wk]);
  const doCollect=({ids,adj,cid,amount,base})=>{if(!adj||adj.length===0){pushWarning('COLLECT_ADJ',{fn:'doCollect',cid});}
    const diff=(amount||0)-(base||amount||0);
    const fw=[...adj];if(diff!==0){const fi=fw.findIndex(w=>w.price>0);if(fi!==-1)fw[fi]={...fw[fi],price:Math.max(fw[fi].price+diff,0)};}
    const idsStr=ids.map(x=>String(x));
    setPaseos(ps=>ps.map(p=>{if(!idsStr.includes(String(p.id)))return p;const a=fw.find(a=>String(a.id)===String(p.id));return{...p,paid:true,pa:a!==undefined?a.price:p.price};}));
    setAjustes(a=>({...a,[cid]:undefined}));setConfPay(null);
  };
  const doPartial=({ids,adj,cid,parcial,amount,base})=>{if(!adj||adj.length===0){pushWarning('COLLECT_ADJ',{fn:'doPartial',cid});}
    const diff=(amount||0)-(base||amount||0);const fw=[...adj];if(diff!==0){const fi=fw.findIndex(w=>w.price>0);if(fi!==-1)fw[fi]={...fw[fi],price:Math.max(fw[fi].price+diff,0)};}
    let r=parcial;
    const idsStr=ids.map(x=>String(x));
    setPaseos(ps=>ps.map(p=>{if(!idsStr.includes(String(p.id))||r<=0)return p;const ae=fw.find(a=>String(a.id)===String(p.id));const pr=ae!==undefined?ae.price:p.price;const ya=p.pa||0;const dif2=pr-ya;if(dif2<=0)return p;const ap=Math.min(r,dif2);r-=ap;const np=ya+ap;return{...p,pa:np,paid:np>=pr};}));
    setAjustes(a=>({...a,[cid]:undefined}));setConfPay(null);
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div style={{fontWeight:800,fontSize:18,color:C.txt}}>{"Cobros"}</div>
        {clienteFoco&&!expandido&&onVolverClientes&&<button onClick={onVolverClientes} style={{...Btn(C.cl,C.grn),padding:"8px 14px",fontSize:13,border:`1px solid ${C.bdr}`}}>{"< Clientes"}</button>}
      </div>
      <div style={{fontSize:12,color:C.mut,marginBottom:14}}>{(()=>{
        const f=new Date(wk.from+"T12:00:00"),t=new Date(wk.to+"T12:00:00");
        const mesesC=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
        return"Semana del "+f.getDate()+" al "+t.getDate()+" de "+mesesC[t.getMonth()];
      })()}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
        {[{l:"Cobrado esta semana",v:totCob,bg:"#14532d",fg:C.grn},{l:"Restante al cierre",v:totPend,bg:"#451a03",fg:C.amb}].map(s=>(
          <div key={s.l} style={{background:s.bg,borderRadius:14,padding:14,border:`1px solid ${s.fg}44`}}>
            <div style={{fontSize:11,color:s.fg,opacity:.8}}>{s.l}</div>
            <div style={{fontSize:20,fontWeight:800,color:s.fg,marginTop:4}}>{$(s.v)}</div>
          </div>
        ))}
      </div>
      {byClient.length===0&&<EmptyTip titulo={"Sin cobros pendientes"} mensaje={"Cuando completes paseos, los cobros aparecen aca automaticamente."}/>}
      {expandido&&byClient.find(x=>x.cl.id===expandido)&&<CobrosFicha
        data={byClient.find(x=>x.cl.id===expandido)}
        paseos={paseos} setPaseos={setPaseos} wk={wk} ajustes={ajustes} adjTotal={adjTotal}
        onVolver={()=>setExpandido(null)}
        onPay={d=>setConfPay(d)}
        onDeuda={d=>setConfDeuda(d)}
        onAdelantado={d=>setConfAdelantado(d)}
        showHistorial={showHistorial} setShowHistorial={setShowHistorial}
        routes={routes} gg={gg} mDogs={mDogs}
      />}
      {!expandido&&(
        <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
          {[{id:"todos",label:"Todos"},{id:"deuda",label:"Con deuda"},{id:"porcobrar",label:"Por cobrar"},{id:"aldia",label:"Al dia"}].map(f=>(
            <button key={f.id} onClick={()=>setFiltroC(f.id)} style={{...Btn(filtroC===f.id?C.grn:C.cl,filtroC===f.id?"#0f1a14":C.mut),padding:"6px 14px",fontSize:12,fontWeight:filtroC===f.id?800:500,borderRadius:20,flexShrink:0,border:`1px solid ${filtroC===f.id?C.grn:C.bdr}`}}>{f.label}</button>
          ))}
        </div>
      )}
      {!expandido&&[...byClient].filter(({cl,items,totalHistorico})=>{
        if(filtroC==="todos")return true;
        const wBase=items.reduce((s,x)=>s+x.wCharge,0);
        const fin=adjTotal(cl.id,wBase);
        const deudaVencida=totalHistorico||0;
        const pendienteSemana=fin||0;
        if(filtroC==="deuda")return deudaVencida>0;
        if(filtroC==="porcobrar")return pendienteSemana>0&&deudaVencida===0;
        if(filtroC==="aldia")return deudaVencida===0&&pendienteSemana===0;
        return true;
      }).map(({cl,items,base,ids,adj,wIds,wAdj,historialOrdenado,totalHistorico})=>{
        const wBase=items.reduce((s,x)=>s+x.wCharge,0);
        const a=ajustes[cl.id]||{type:"pesos",val:0};
        const fin=adjTotal(cl.id,wBase);
        const totalPendiente=(fin||0)+(totalHistorico||0);
        const alDia=totalPendiente===0;
        const conDeudaVieja=(totalHistorico||0)>0;
        const byDog={};items.forEach(s=>{if(!byDog[s.dog.id])byDog[s.dog.id]={dog:s.dog,grps:[]};byDog[s.dog.id].grps.push(s);});
        const clInitial=cl.name.charAt(0).toUpperCase();
        const clColor=alDia?C.grn:conDeudaVieja?C.red:C.amb;
        return(
          <div key={cl.id} onClick={()=>setExpandido(cl.id)} style={{...CARD,borderLeft:`3px solid ${clColor}`,cursor:"pointer",display:"flex",alignItems:"center",gap:12,opacity:alDia?0.75:1}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:clColor+"22",border:`2px solid ${clColor}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:clColor,flexShrink:0}}>{clInitial}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:800,fontSize:16,color:C.txt}}>{cl.name}</div>
              <div style={{fontSize:12,color:C.mut,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {Object.values(byDog).map(x=>x.dog.name).join(", ")}
                {conDeudaVieja&&<span style={{color:C.red,marginLeft:6,fontWeight:700}}>{"+ deuda anterior"}</span>}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              {alDia?(
                <div style={{fontSize:13,color:C.grn,fontWeight:700}}>{"Al dia ✓"}</div>
              ):(
                <>
                  <div style={{fontSize:11,color:C.mut}}>{"Te debe"}</div>
                  <div style={{fontSize:18,fontWeight:800,color:clColor}}>{$(totalPendiente)}</div>
                </>
              )}
            </div>
            <span style={{color:C.mut,fontSize:14}}>{">"}</span>
          </div>
        );
      })}
      {confAdelantado&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,borderRadius:20,padding:24,maxWidth:340,width:"100%",border:`1px solid ${C.bdr}`}}>
            <div style={{textAlign:"center",marginBottom:8,display:"flex",justifyContent:"center"}}><Icon name="cobros" size={32} color={C.grn}/></div>
            <div style={{fontWeight:800,fontSize:18,color:C.txt,textAlign:"center",marginBottom:4}}>{"Cobro adelantado"}</div>
            <div style={{fontSize:13,color:C.mut,textAlign:"center",marginBottom:16}}>{confAdelantado.cl.name}</div>
            <div style={{fontSize:12,color:C.mut,marginBottom:12,background:C.cl,borderRadius:8,padding:"8px 12px"}}>{"Registra un pago que descontaras al final de la semana"}</div>
            <label style={LBL}>{"Monto"}</label>
            <input type="number" value={confAdelantado.monto||""} placeholder={"ej: 30000"}
              onChange={e=>setConfAdelantado(p=>({...p,monto:numInt(e.target.value)}))}
              style={{...INP,fontSize:22,fontWeight:800,textAlign:"right",color:C.blu,marginBottom:16}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfAdelantado(null)} style={{...Btn(C.cl,C.mut),flex:1}}>{"Cancelar"}</button>
              <button onClick={()=>{if(confAdelantado.monto>0)doAdelantado({cid:confAdelantado.cid,monto:confAdelantado.monto});setConfAdelantado(null);}} style={{...Btn(C.blu,"white"),flex:2,fontWeight:800}}>{"Registrar "+$(confAdelantado.monto||0)}</button>
            </div>
          </div>
        </div>
      )}
      {confDeuda&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,borderRadius:20,padding:24,maxWidth:340,width:"100%",border:`1px solid ${C.bdr}`}}>
            <div style={{textAlign:"center",marginBottom:8,display:"flex",justifyContent:"center"}}><Icon name="cobros" size={32} color={C.grn}/></div>
            <div style={{fontWeight:800,fontSize:18,color:C.txt,textAlign:"center",marginBottom:4}}>{"Saldar deuda anterior"}</div>
            <div style={{fontSize:14,color:C.mut,textAlign:"center",marginBottom:16}}>{confDeuda.cl.name}</div>
            <label style={LBL}>{"Monto"}</label>
            <input type="number" value={confDeuda.parcial!==undefined?confDeuda.parcial:confDeuda.totalHistorico}
              onChange={e=>setConfDeuda(p=>({...p,parcial:numInt(e.target.value)}))}
              style={{...INP,fontSize:22,fontWeight:800,textAlign:"right",color:C.amb,marginBottom:8}}/>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {[25,50,75,100].map(pct=>(
                <button key={pct} onClick={()=>setConfDeuda(p=>({...p,parcial:Math.round(p.totalHistorico*pct/100)}))}
                  style={{flex:1,background:C.amb+"22",border:`1px solid ${C.amb}44`,borderRadius:8,padding:"5px 0",fontSize:11,fontWeight:700,color:C.amb,cursor:"pointer"}}>{pct+"%"}</button>
              ))}
            </div>
            {confDeuda.parcial!==undefined&&confDeuda.parcial<confDeuda.totalHistorico&&(
              <div style={{fontSize:11,color:C.amb,textAlign:"center",marginBottom:8}}>{"El pago se aplica a las semanas mas antiguas primero"}</div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfDeuda(null)} style={{...Btn(C.cl,C.mut),flex:1}}>{"Cancelar"}</button>
              <button onClick={()=>{const m=confDeuda.parcial!==undefined?confDeuda.parcial:confDeuda.totalHistorico;doPartialDeuda({...confDeuda,parcial:m});}} style={{...Btn(C.amb,"#1a0f00"),flex:2,fontWeight:800}}>
                {confDeuda.parcial!==undefined&&confDeuda.parcial<confDeuda.totalHistorico?"Abonar "+$(confDeuda.parcial):"Saldar "+$(confDeuda.totalHistorico)}
              </button>
            </div>
          </div>
        </div>
      )}
      {confPay&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.card,borderRadius:20,padding:24,maxWidth:340,width:"100%",border:`1px solid ${C.bdr}`}}>
            <div style={{fontWeight:800,fontSize:18,color:C.txt,textAlign:"center",marginBottom:4}}>{"Cobrar a "+confPay.cl.name}</div>
            <div style={{fontSize:13,color:C.mut,textAlign:"center",marginBottom:16}}>{"Te debe "+$(confPay.amount)}</div>
            <label style={LBL}>{"Monto"}</label>
            <input type="number" value={confPay.parcial!==undefined?confPay.parcial:confPay.amount} onChange={e=>setConfPay(p=>({...p,parcial:numInt(e.target.value)}))} style={{...INP,fontSize:22,fontWeight:800,textAlign:"right",color:C.grn,marginBottom:8}}/>
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[25,50,75,100].map(pct=>(
                <button key={pct} onClick={()=>setConfPay(p=>({...p,parcial:Math.round(p.amount*pct/100)}))} style={{flex:1,background:C.grn+"22",border:`1px solid ${C.grn}44`,borderRadius:8,padding:"5px 0",fontSize:11,fontWeight:700,color:C.grn,cursor:"pointer"}}>{pct+"%"}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfPay(null)} style={{...Btn(C.cl,C.mut),flex:1}}>{"Cancelar"}</button>
              <button onClick={()=>{const m=confPay.parcial!==undefined?confPay.parcial:confPay.amount;if(m<confPay.amount)doPartial({...confPay,parcial:m,amount:confPay.amount});else doCollect({...confPay,amount:confPay.amount});}} style={{...Btn(C.grn,"#0f1a14"),flex:2,fontWeight:800}}>
                {confPay.parcial!==undefined&&confPay.parcial<confPay.amount?"Abonar "+$(confPay.parcial):"Confirmar "+$(confPay.amount)}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Clientes({dogs,setDogs,clients,setClients,paseos,setPaseos,gg,onAdd,onGoCobros,clienteInicial,mDogs}){
  const[sel,setSel]=useState(null);
  const aplicadoRef=useRef(null);
  useEffect(()=>{
    if(clienteInicial&&aplicadoRef.current!==clienteInicial){
      aplicadoRef.current=clienteInicial;
      setSel(clienteInicial);
    }
  },[clienteInicial]);
  const[editD,setEditD]=useState(null);
  const[delD,setDelD]=useState(null);
  const[addD,setAddD]=useState(false);
  const[openEmg,setOpenEmg]=useState(false);
  const[busqueda,setBusqueda]=useState("");
  const[filtro,setFiltro]=useState("todos");
  const[editC,setEditC]=useState(null);
  const[cxlOpen,setCxlOpen]=useState(false);
  const T=td();
  const wk=wkRange(T);
  const finanzas=useMemo(()=>{
    const result=buildClientFinancials(clients,mDogs,paseos,wk);
    const map={};
    result.forEach(c=>{
      const wBase=c.items.reduce((s,x)=>s+x.wCharge,0);
      const totalDeuda=wBase+c.totalHistorico;
      const desc=c.cl.descuento||0;
      const wConDesc=desc>0?Math.round(wBase*(1-desc/100)):wBase;
      const abW=paseos.filter(p=>c.items.some(it=>it.dog.id===p.dogId)&&p.fecha>=wk.from&&p.fecha<=wk.to&&(p.pa||0)>0).reduce((s,p)=>s+(p.pa||0),0);
      map[c.cl.id]={wCharge:wBase,wConDesc,totalHistorico:c.totalHistorico,totalDeuda,abW,hayDeuda:totalDeuda>0,hayAdelanto:abW>wConDesc&&wConDesc>0};
    });
    return map;
  },[clients,mDogs,paseos,wk]);
  const ED={name:"",breed:"",notes:"",vet:"",med:"",emg:"",cancellations:[],groups:[]};
  const[nDog,setNDog]=useState({...ED});
  const saveEditDog=()=>{
    const u=editD;
    setPaseos(ps=>{const kept=ps.filter(p=>!(p.dogId===u.id&&p.status==="programado"&&p.fecha>=td()));let n=[...kept];(u.groups||[]).forEach(g=>{n=[...n,...makePaseos(u,g,n)];});return n;});
    setDogs(ds=>ds.map(d=>d.id===u.id?u:d));setEditD(null);
  };
  const doAddDog=cid=>{
    if(!nDog.name)return;
    const colors=["#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899","#f97316","#14b8a6"];
    const dog={...nDog,id:uid(),cid,color:colors[dogs.length%colors.length]};
    setDogs(ds=>[...ds,dog]);let np=[];(dog.groups||[]).forEach(g=>{np=[...np,...makePaseos(dog,g,[])];});setPaseos(ps=>[...ps,...np]);
    setNDog({...ED});setAddD(false);
  };
  const doDelDog=id=>{setDogs(ds=>ds.filter(d=>d.id!==id));setPaseos(ps=>ps.filter(p=>p.dogId!==id));setDelD(null);};
  const doDelCl=cid=>{const ids=dogs.filter(d=>d.cid===cid).map(d=>d.id);setDogs(ds=>ds.filter(d=>d.cid!==cid));setPaseos(ps=>ps.filter(p=>!ids.includes(p.dogId)));setClients(cs=>cs.filter(c=>c.id!==cid));setSel(null);};
  if(!sel)return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:18,color:C.txt}}>{"Clientes"}</div>
        <button onClick={onAdd} style={{...Btn(C.grn,"#0f1a14"),padding:"8px 16px",fontSize:13}}>{"+ Añadir"}</button>
      </div>
      {/* Buscador */}
      <div style={{display:"flex",alignItems:"center",background:C.cl,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"8px 12px",marginBottom:10,gap:8}}>
        <span style={{color:C.mut,fontSize:16}}>{"🔍"}</span>
        <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder={"Buscar cliente o perro..."} style={{background:"none",border:"none",outline:"none",color:C.txt,fontSize:14,flex:1,fontFamily:"inherit"}}/>
        {busqueda&&<button onClick={()=>setBusqueda("")} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:16}}>{"×"}</button>}
      </div>
      {/* Filtros */}
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {[{id:"todos",label:"Todos"},{id:"hoy",label:"Hoy"},...gg.map(g=>({id:"g:"+g.id,label:g.name}))].map(f=>(
          <button key={f.id} onClick={()=>setFiltro(f.id)} style={{...Btn(filtro===f.id?C.grn:C.cl,filtro===f.id?"#0f1a14":C.mut),padding:"6px 14px",fontSize:12,fontWeight:filtro===f.id?800:500,borderRadius:20,flexShrink:0,border:`1px solid ${filtro===f.id?C.grn:C.bdr}`}}>{f.label}</button>
        ))}
      </div>
      {clients.length===0&&<EmptyTip titulo={"Agrega tu primer cliente"} mensaje={"Tocá '+ Añadir' arriba a la derecha para empezar. Despues podes cargar sus perros."}/>}
      {clients.filter(c=>{
        const cd=mDogs.filter(d=>d.cid===c.id);
        const T2=td();
        const wk=wkRange(T2);
        // Filtro búsqueda
        if(busqueda){
          const q=busqueda.toLowerCase();
          const matchC=c.name.toLowerCase().includes(q);
          const matchD=cd.some(d=>d.name.toLowerCase().includes(q));
          if(!matchC&&!matchD)return false;
        }
        // Filtros rápidos
        if(filtro==="hoy"){
          return paseos.some(p=>cd.some(d=>d.id===p.dogId)&&p.fecha===T2&&p.status!=="cancelado");
        }
        if(filtro&&filtro.startsWith("g:")){
          const gid=filtro.slice(2);
          return cd.some(d=>(d.groups||[]).some(grp=>(grp.gid||grp.id)===gid||grp.gid===gid));
        }
        return true;
      }).map(c=>{
        const cd=mDogs.filter(d=>d.cid===c.id);
        const pw=paseos.filter(p=>cd.some(d=>d.id===p.dogId)&&p.status==="completado").length;
        const T2=td();
        const f=finanzas[c.id]||{hayDeuda:false,hayAdelanto:false};

        const hayAdelantos=f.hayAdelanto;
        const hayHoy=paseos.some(p=>cd.some(d=>d.id===p.dogId)&&p.fecha===T2&&p.status!=="cancelado");
        // Estado visual
        let estadoIcon,estadoTxt,estadoColor,estadoIsSvg=false;
        if(hayDeuda){estadoIcon="⚠️";estadoTxt="Con deuda";estadoColor="#f97316";}
        else if(hayAdelantos){estadoIcon="✅";estadoTxt="Al día";estadoColor=C.grn;}
        else if(hayHoy){estadoIcon="agenda";estadoTxt="Hoy";estadoColor=C.blu;estadoIsSvg=true;}
        else{estadoIcon="✅";estadoTxt="Al día";estadoColor=C.grn;}
        const initial=c.name.charAt(0).toUpperCase();
        // Próximo paseo
        const proxPaseo=paseos.filter(p=>cd.some(d=>d.id===p.dogId)&&p.fecha>=T2&&p.status==="programado").sort((a,b)=>a.fecha.localeCompare(b.fecha))[0];
        const proxFecha=proxPaseo?proxPaseo.fecha.slice(5).replace("-","/"): null;
        const proxHoy=proxPaseo?.fecha===T2;
        // Modelo de facturación — tomar el primer grupo
        const primerGrp=cd.flatMap(d=>d.groups||[]).find(g=>g.id);
        const billing=primerGrp?.billingType||"pack_dinamico";
        const packSize=primerGrp?.schedule?.length||0;
        const packInfo=billing==="fijo_semanal"?"Tarifa fija":billing==="por_paseo"?"Por paseo":packSize>0?(packSize+" dias/sem"):null;
        return(<div key={c.id} onClick={()=>setSel(c.id)} style={{...CARD,cursor:"pointer",display:"flex",alignItems:"center",gap:12,borderLeft:`3px solid ${hayHoy?C.blu:C.grn}`}}>
          <div style={{width:44,height:44,borderRadius:"50%",background:C.grn+"22",border:`2px solid ${C.grn}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:C.grn,flexShrink:0}}>{initial}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:15,color:C.txt}}>{c.name}</div>
            <div style={{fontSize:12,color:C.mut,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cd.map(d=>d.name).join(", ")||"Sin perros"}</div>
            <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
              {packInfo&&<span style={{fontSize:10,background:C.grn+"22",color:C.grn,padding:"1px 6px",borderRadius:10,fontWeight:700}}>{packInfo}</span>}
              {proxFecha&&<span style={{fontSize:10,background:proxHoy?C.blu+"22":C.cl,color:proxHoy?C.blu:C.mut,padding:"1px 6px",borderRadius:10}}>{proxHoy?"Hoy":"Próx: "+proxFecha}</span>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
            {hayDeuda?(
              <button onClick={e=>{e.stopPropagation();onGoCobros&&onGoCobros(c.id);}} style={{...Btn(C.amb,"#1a0a00"),padding:"4px 10px",fontSize:11,fontWeight:800,borderRadius:8}}>{"Cobrar"}</button>
            ):(
              <>
                {estadoIsSvg?<Icon name={estadoIcon} size={16} color={estadoColor}/>:<span style={{fontSize:16}}>{estadoIcon}</span>}
                <span style={{fontSize:10,color:estadoColor,fontWeight:700}}>{estadoTxt}</span>
              </>
            )}
          </div>
          {c.phone&&<a href={"https://wa.me/"+c.phone.replace(/\D/g,"")} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{background:C.wa,color:"white",width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",textDecoration:"none",flexShrink:0,fontSize:16,fontWeight:800}}>{"W"}</a>}
          <span style={{color:C.mut,fontSize:14}}>{">"}</span>
        </div>);
      })}
    </div>
  );
  const c=clients.find(x=>x.id===sel);
  const cd=mDogs.filter(d=>d.cid===sel);
  const aw=paseos.filter(p=>cd.some(d=>d.id===p.dogId));
  const cxls=cd.flatMap(d=>(d.cancellations||[]).map((x,ci)=>({...x,dname:d.name,did:d.id,ci}))).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  return(
    <div>
      <button onClick={()=>setSel(null)} style={{...Btn("transparent",C.grn),padding:"0 0 14px",fontSize:14}}>{"< Volver"}</button>

        <div style={{fontWeight:800,fontSize:20,color:C.txt,marginBottom:4}}>{c?.name}</div>
        <div style={{fontSize:13,color:C.mut,marginBottom:2}}>{c?.phone}</div>
        <div style={{fontSize:12,color:C.mut,marginBottom:12}}>{c?.address}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {[{l:"PASEOS",v:aw.filter(p=>p.status==="completado").length},{l:"COBRADO",v:$(aw.filter(p=>p.status==="completado").reduce((s,p)=>s+(p.pa||0),0))}].map(s=>(
            <div key={s.l} style={{background:C.cl,borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:10,color:C.mut,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.l}</div>
              <div style={{fontSize:18,fontWeight:800,color:C.grn,marginTop:2}}>{s.v}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <button onClick={()=>setEditC({...c})} style={{...Btn(C.cl,C.mut),flex:1}}>{"Editar"}</button>
          <a href={waLink(c?.phone||"","Hola "+c?.name+", ")} target="_blank" rel="noreferrer" style={{...Btn(C.wa,"white"),flex:1,textDecoration:"none",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>{"WhatsApp"}</a>
        </div>
        <button onClick={()=>doDelCl(sel)} style={{...Btn("#1a0505","#fca5a5"),width:"100%",fontSize:13}}>{"Eliminar cliente"}</button>

        <button onClick={()=>setAddD(true)} style={{...Btn(C.grn,"#0f1a14"),padding:"6px 14px",fontSize:13}}>{"+ Perro"}</button>
      </div>
      {cd.length===0&&<EmptyTip titulo={"Agrega el perro"} mensaje={"Toca '+ Perro' para cargarlo. Vas a elegir grupo, dias y tipo de cobro."}/>}
      {cd.map(dog=>(
        <div key={dog.id} style={CARD}>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>

            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:16,color:C.txt}}>{dog.name}</div>
              <div style={{fontSize:13,color:C.mut}}>{dog.breed||"--"}</div>
            </div>
          </div>
          {(dog.groups||[]).map(g=>(
            <div key={g.id} style={{background:C.cl,borderRadius:8,padding:"8px 10px",marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{fontWeight:700,fontSize:13,color:C.grn}}>{g.name}</span>
                  <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                    {g.schedule.map(d=><span key={d} style={{background:C.grn,color:"#0f1a14",fontSize:11,padding:"1px 6px",borderRadius:10,fontWeight:700}}>{DAYS[d]}</span>)}

                  <div style={{fontWeight:700,color:C.grn,fontSize:14}}>{$(g.unitPrice>0?g.unitPrice:pFor(g.schedule.length,g.prices))}</div>

                <button onClick={()=>setDogs(ds=>ds.map(d=>d.id===x.did?{...d,cancellations:(d.cancellations||[]).filter((_,j)=>j!==x.ci)}:d))} style={{background:"transparent",border:"none",color:C.mut,fontSize:16,cursor:"pointer",padding:"0 4px",lineHeight:1,opacity:0.6}}>{"x"}</button>

          <div style={{display:"grid",gap:12}}>
            {[{k:"name",l:"Nombre"},{k:"phone",l:"WhatsApp"},{k:"address",l:"Direccion"}].map(f=>(

function Rutas({routes,setRoutes,dogs,clients,paseos,gg,setGG,globalRoute,setGlobalRoute,rutaTab,setRutaTab,mDogs,deepLink,onDeepLinkConsumed}){
  const T=td();
  const[selDow,setSelDow]=useState(null);
  const[selGid,setSelGid]=useState(null);

  const[draftG,setDraftG]=useState(null);
  const[confDeleteGid,setConfDeleteGid]=useState(null);
  // Si Agenda nos manda con deepLink (gid+dow), abrimos esa ruta directo
  useEffect(()=>{
    if(deepLink&&deepLink.gid!=null&&deepLink.dow!=null){
      setSelGid(deepLink.gid);
      setSelDow(deepLink.dow);

  const dst=r=>r?.destination||gg.find(g=>g.id===selGid)?.destination||"";
  const activeGG=useCallback(dow=>{const s=new Set();mDogs.forEach(d=>(d.groups||[]).forEach(g=>{if(g.schedule.includes(Number(dow)))s.add(g.gid);}));return gg.filter(g=>s.has(g.id)).sort((a,b)=>a.startTime.localeCompare(b.startTime));},[mDogs,gg]);
  const dogsOnDG=useCallback((dow,gid,fecha)=>{
    // Regla simple: el perro aparece en la ruta si tiene un paseo en (fecha, gid).
    // Esto cubre 3 casos: paseo por config habitual, paseo manual (+), paseo movido (⇄).
    // Si el perro tenia un paseo por config pero lo movio a otro dia, ese paseo NO esta en (fecha, gid)
    // entonces no aparece. Correcto.
    if(fecha){
      const dogIds=[...new Set(paseos.filter(p=>p.gid===gid&&p.fecha===fecha).map(p=>p.dogId))];
      return mDogs.filter(d=>dogIds.includes(d.id));

    // Sin fecha (vista template del dow): solo por config habitual
    return mDogs.filter(d=>(d.groups||[]).some(g=>g.gid===gid&&g.schedule.includes(Number(dow))));
  },[mDogs,paseos]);
  const getRoute=(dow,gid)=>{const key=`${dow}_${gid}`;return routes.find(r=>r.key===key)||{key,dow,gid,startTime:gg.find(g=>g.id===gid)?.startTime||"08:00",origin:"",destination:"",stopOrder:[],legMins:[],stayMins:60};};
  const saveRoute=r=>setRoutes(rs=>{const e=rs.find(x=>x.key===r.key);return e?rs.map(x=>x.key===r.key?r:x):[...rs,r];});
  const arrivals=(route,stopsActive,stopsAll)=>{const ord=stopsAll||stopsActive;let cur=route.startTime||"08:00";const arr=[];stopsActive.forEach((_,i)=>{cur=addMin(cur,sumLegMinsForActive(route.legMins||[],ord,stopsActive,i));arr.push(cur);});arr.push(addMin(cur,sumLegMinsForActive(route.legMins||[],ord,stopsActive,stopsActive.length)));return arr;};
  const plazaArrival=(route,stopsActive,stopsAll)=>{const ord=stopsAll||stopsActive;let cur=route.startTime||"08:00";stopsActive.forEach((_,i)=>{cur=addMin(cur,sumLegMinsForActive(route.legMins||[],ord,stopsActive,i));});cur=addMin(cur,sumLegMinsForActive(route.legMins||[],ord,stopsActive,stopsActive.length));return cur;};
  const plazaDeparture=(route,stopsActive,stopsAll)=>{const stay=route.stayMins??60;return addMin(plazaArrival(route,stopsActive,stopsAll),stay);};
  const arrivalsReturn=(route,returnStopsActive,idaStopsActive,returnStopsAll,idaStopsAll)=>{const dep=plazaDeparture(route,idaStopsActive,idaStopsAll);const rBase=returnStopsAll||returnStopsActive;let cur=dep;const arr=[];returnStopsActive.forEach((_,i)=>{cur=addMin(cur,sumLegMinsForActive(route.returnMins||[],rBase,returnStopsActive,i));arr.push(cur);});arr.push(addMin(cur,sumLegMinsForActive(route.returnMins||[],rBase,returnStopsActive,returnStopsActive.length)));return arr;};
  const moveStop=(route,stops,f,t)=>{const s=[...stops];const[m]=s.splice(f,1);s.splice(t,0,m);saveRoute({...route,stopOrder:s.map(d=>d.id)});};
  const moveReturnStop=(route,stops,f,t)=>{const s=[...stops];const[m]=s.splice(f,1);s.splice(t,0,m);saveRoute({...route,returnOrder:s.map(d=>d.id)});};
  const fechaDow=useMemo(()=>{if(selDow===null)return T;const wk=wkRange(T);const base=new Date(wk.from+"T12:00:00");for(let i=0;i<=6;i++){const d=new Date(base);d.setDate(base.getDate()+i);if(d.getDay()===Number(selDow)){const y=d.getFullYear(),m=p2(d.getMonth()+1),dd2=p2(d.getDate());const f=`${y}-${m}-${dd2}`;if(f<T){const d2=new Date(d);d2.setDate(d.getDate()+7);return`${d2.getFullYear()}-${p2(d2.getMonth()+1)}-${p2(d2.getDate())}`;}return f;}}return T;},[T,selDow]);
  if(selDow===null&&selGid===null)return(

      {gg.map(g=>{

          </div>

            <button onClick={()=>setEditG(false)} style={{...Btn(C.cl,C.mut),flex:1}}>{"Cancelar"}</button>
            <button onClick={()=>{const exists=gg.find(g=>g.id===draftG.id);if(exists){setGG(gs=>gs.map(g=>g.id===draftG.id?draftG:g));}else{setGG(gs=>[...gs,draftG]);}setEditG(false);setDraftG(null);}} style={{...Btn(C.grn,"#0f1a14"),flex:2}}>{"Guardar"}</button>
          </div>
        </Modal>
      )}
      {confDeleteGid&&(()=>{const g=gg.find(x=>x.id===confDeleteGid);if(!g)return null;return(
        <div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div style={{background:C.bg,maxWidth:340,padding:20,borderRadius:16,border:`1px solid ${C.red}44`}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:8,color:C.red}}>{"Eliminar grupo?"}</div>
            <div style={{fontSize:13,color:C.mut,marginBottom:16,lineHeight:1.5}}>{"Se eliminara \""+g.name+"\". Los perros asignados quedaran sin grupo. Esta accion no se puede deshacer."}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfDeleteGid(null)} style={{...Btn(C.cl,C.mut),flex:1}}>{"Cancelar"}</button>
              <button onClick={()=>{setGG(gs=>gs.filter(x=>x.id!==confDeleteGid));setConfDeleteGid(null);}} style={{...Btn(C.red,"white"),flex:1,fontWeight:700}}>{"Eliminar"}</button>
            </div>
          </div>
        </div>
      );})()}
    </div>
  );
  if(selGid!==null&&selDow===null){const globalG=gg.find(g=>g.id===selGid);const diasDelGrupo=DAYS.map((lbl,dow)=>({dow,lbl})).filter(({dow})=>activeGG(dow).some(g=>g.id===selGid));return(
    <div>
      <button onClick={()=>{setSelGid(null);setRutaTab("ruta");}} style={{...Btn("transparent",C.grn),padding:"0 0 14px",fontSize:14}}>{"< Rutas"}</button>
      <div style={{fontWeight:800,fontSize:20,color:C.txt,marginBottom:16}}>{globalG?.name||""}</div>
      {/* Card puntos fijos del grupo */}
      <div style={{...CARD,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontWeight:700,fontSize:14,color:C.txt}}>{"Puntos fijos"}</span>
          <button onClick={()=>{setDraftG({...globalG});setEditG(true);}} style={{...Btn(C.cl,C.grn),padding:"6px 12px",fontSize:12,border:`1px solid ${C.bdr}`}}>{"Editar"}</button>
        </div>
        <div style={{fontSize:13,color:globalG?.origin?C.txt:C.mut,marginBottom:4}}>{"Partida: "+(globalG?.origin||"Sin configurar")}</div>
        <div style={{fontSize:13,color:globalG?.destination?C.txt:C.mut,marginBottom:4}}>{"Destino: "+(globalG?.destination||"Sin configurar")}</div>
        <div style={{fontSize:12,color:C.mut}}>{globalG?.minPorKm?"Velocidad: "+globalG.minPorKm+" min/km":"Velocidad: sin configurar"}</div>

      {diasDelGrupo.map(({dow,lbl})=>{const dd=dogsOnDG(dow,selGid,fechaDow);return(
        <div key={dow} onClick={()=>setSelDow(dow)} style={{...CARD,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>

            <div style={{fontSize:12,color:C.mut}}>{dd.length+" perros · "+(globalG?.startTime||"")}</div>
          </div>
          <span style={{color:C.mut,fontSize:18}}>{">"}</span>
        </div>
      );})}
      {editG&&draftG&&(
        <Modal onClose={()=>setEditG(false)} title={"Puntos fijos - "+(globalG?.name||"")}>
          <div style={{display:"grid",gap:12}}>

            <div><label style={LBL}>{"Partida"}</label><input value={draftG.origin||""} onChange={e=>setDraftG(g=>({...g,origin:e.target.value}))} placeholder={"Tu casa"} style={INP}/></div>

              <div style={{fontSize:11,color:C.mut,marginTop:4}}>{draftG.minPorKm>0?(draftG.minPorKm+" min/km = aprox "+(60/draftG.minPorKm).toFixed(1)+" km/h"):"Ingresa la velocidad estimada"}</div>

  const route=getRoute(selDow,selGid);

  const ordered=route.stopOrder?.length?[...route.stopOrder.map(id=>allStops.find(d=>d.id===id)).filter(Boolean),...allStops.filter(d=>!route.stopOrder.includes(d.id))]:allStops;
  const cxlIds=selGid?paseos.filter(p=>p.fecha===fechaDow&&p.status==="cancelado"&&(p.gid===selGid||p.dgid===selGid)).map(p=>p.dogId):[];
  const orderedActive=ordered.filter(d=>!cxlIds.includes(d.id));

  const or=orig(route),de=dst(route);
  const addrs=[or,...orderedActive.map(d=>getCl(d.cid)?.address||""),de];
  const fullUrl=or&&de&&orderedActive.length>0?mapsRoute(addrs):null;
  const returnBase=route.returnOrder?.length?[...route.returnOrder.map(id=>allStops.find(d=>d.id===id)).filter(Boolean),...allStops.filter(d=>!route.returnOrder.includes(d.id))]:[...orderedActive];
  const returnActive=returnBase.filter(d=>!cxlIds.includes(d.id));
  // Normalizar returnMins: debe tener exactamente returnBase.length+1 tramos (alineado al orden con cancelados)
  // Si faltan → append 0 silencioso. Si sobran → trim.
  // Flag de desalineación: cuando el array guardado difiere del esperado
  const expectedReturnMins=returnBase.length+1;

  const returnMinsDesalineado=storedReturnMins>0&&storedReturnMins!==expectedReturnMins;
  const returnMinsNorm=(()=>{const m=[...(route.returnMins||[])];while(m.length<expectedReturnMins)m.push(0);return m.slice(0,expectedReturnMins);})();
  const routeNorm={...route,returnMins:returnMinsNorm};

  // Helpers para mapear ediciones de legMins/returnMins (filtrado activo) al array completo (con cancelados)
  const legMinFor=(activeIdx)=>{const lm=draft?.legMins||route.legMins||[];return sumLegMinsForActive(lm,ordered,orderedActive,activeIdx);};
